<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070B17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Century Gate">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Order tracking dashboard for Century Gate Company Ltd — a Saudi printing & packaging company.">
<meta name="keywords" content="Century Gate, order tracker, printing, packaging, Saudi Arabia, SAR">
<meta name="author" content="Century Gate Company Ltd">
<meta property="og:title" content="Century Gate — Order Tracker">
<meta property="og:description" content="Order tracking dashboard for Century Gate Company Ltd.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Century Gate">
<title>Century Gate — Order Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" crossorigin="anonymous" defer></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js" crossorigin="anonymous" defer></script>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js" crossorigin="anonymous" defer></script>

<style>
:root {
  --bg: #070B17;
  --bg-grad-1: #0A1124;
  --bg-grad-2: #070B17;
  --sidebar: #0F172A;
  --card: #111827;
  --card-2: #161F33;
  --stripe: #0D1424;
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.12);
  --hover: rgba(255,255,255,0.04);
  --primary: #2563EB;
  --primary-2: #3B82F6;
  --accent: #06B6D4;
  --accent-2: #22D3EE;
  --primary-grad: linear-gradient(135deg, #2563EB 0%, #06B6D4 100%);
  --primary-glow: rgba(37,99,235,0.4);
  --primary-soft: rgba(37,99,235,0.14);
  --accent-soft: rgba(6,182,212,0.14);
  --success: #22C55E;
  --success-soft: rgba(34,197,94,0.14);
  --warning: #F59E0B;
  --warning-soft: rgba(245,158,11,0.14);
  --danger: #EF4444;
  --danger-soft: rgba(239,68,68,0.14);
  --text: #FFFFFF;
  --sub: #94A3B8;
  --muted: #64748B;
  --topbar-bg: rgba(7,11,23,0.6);
}
[data-theme="light"] {
  --bg: #F8FAFC;
  --bg-grad-1: #FFFFFF;
  --bg-grad-2: #F1F5F9;
  --sidebar: #FFFFFF;
  --card: #FFFFFF;
  --card-2: #F8FAFC;
  --stripe: #F1F5F9;
  --border: rgba(15,23,42,0.08);
  --border-strong: rgba(15,23,42,0.14);
  --hover: rgba(15,23,42,0.03);
  --primary-soft: rgba(37,99,235,0.08);
  --accent-soft: rgba(6,182,212,0.08);
  --success-soft: rgba(34,197,94,0.10);
  --warning-soft: rgba(245,158,11,0.10);
  --danger-soft: rgba(239,68,68,0.10);
  --text: #0F172A;
  --sub: #475569;
  --muted: #94A3B8;
  --topbar-bg: rgba(255,255,255,0.8);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  background-image: radial-gradient(circle at 20% 0%, var(--bg-grad-1), var(--bg-grad-2) 50%);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}
body::before, body::after {
  content: ''; position: fixed; border-radius: 50%;
  filter: blur(140px); opacity: 0.15; pointer-events: none; z-index: 0;
}
body::before { width: 600px; height: 600px; background: var(--primary); top: -200px; left: -100px; }
body::after { width: 500px; height: 500px; background: var(--accent); top: 40%; right: -150px; }
[data-theme="light"] body::before, [data-theme="light"] body::after { opacity: 0.08; }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  position: relative;
  transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), border-color 0.25s, box-shadow 0.25s;
}
.card-hover:hover {
  transform: translateY(-3px);
  border-color: var(--border-strong);
  box-shadow: 0 16px 50px rgba(0,0,0,0.35), 0 0 0 1px var(--primary-soft);
}
[data-theme="light"] .card-hover:hover { box-shadow: 0 16px 50px rgba(15,23,42,0.08), 0 0 0 1px var(--primary-soft); }

.sidebar {
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  width: 264px;
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto; overflow-x: hidden;
  z-index: 50;
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
  flex-shrink: 0;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 12px; border-radius: 10px;
  color: var(--sub); cursor: pointer; transition: all 0.2s;
  font-size: 14px; font-weight: 500;
}
.nav-item:hover { background: var(--hover); color: var(--text); }
.nav-item.active {
  background: var(--primary-grad); color: white;
  box-shadow: 0 8px 24px var(--primary-glow);
}
.nav-item .badge-count {
  margin-left: auto; background: var(--accent-soft); color: var(--accent);
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px;
}
.nav-item.active .badge-count { background: rgba(255,255,255,0.2); color: white; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 18px; border-radius: 10px;
  font-size: 14px; font-weight: 600; font-family: inherit;
  cursor: pointer; border: none;
  transition: transform 0.18s cubic-bezier(0.16,1,0.3,1), box-shadow 0.18s, background 0.18s;
  position: relative; overflow: hidden; white-space: nowrap;
}
.btn-primary { background: var(--primary-grad); color: white; box-shadow: 0 4px 14px var(--primary-glow); }
.btn-primary:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 12px 28px var(--primary-glow); }
.btn-primary:active { transform: translateY(0) scale(0.98); }
.btn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--text); }
.btn-ghost:hover { background: var(--hover); border-color: var(--border-strong); transform: translateY(-1px); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--hover); border-color: var(--border-strong); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #DC2626; }
.btn-icon {
  width: 40px; height: 40px; padding: 0; border-radius: 10px;
  background: var(--card); border: 1px solid var(--border); color: var(--sub);
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.btn-icon:hover { background: var(--hover); color: var(--text); border-color: var(--border-strong); }
.ripple {
  position: absolute; border-radius: 50%; transform: scale(0);
  animation: rippleAnim 0.6s ease-out; background: rgba(255,255,255,0.4);
  pointer-events: none;
}
@keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

.kpi { padding: 22px; position: relative; overflow: hidden; }
.kpi::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 120px; height: 120px; border-radius: 50%;
  filter: blur(40px); opacity: 0.35; pointer-events: none;
}
.kpi.kpi-revenue::before { background: var(--primary); }
.kpi.kpi-orders::before { background: var(--accent); }
.kpi.kpi-production::before { background: var(--success); }
.kpi.kpi-delivered::before { background: var(--primary); }
.kpi.kpi-pending::before { background: var(--warning); }
.kpi.kpi-cliche::before { background: var(--accent); }
.kpi-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
}
.icon-primary { background: var(--primary-soft); color: var(--primary); }
.icon-accent { background: var(--accent-soft); color: var(--accent); }
.icon-success { background: var(--success-soft); color: var(--success); }
.icon-warning { background: var(--warning-soft); color: var(--warning); }
.icon-danger { background: var(--danger-soft); color: var(--danger); }
.kpi-value {
  font-size: 32px; font-weight: 800; letter-spacing: -0.02em;
  line-height: 1.1; color: var(--text);
}
.kpi-delta {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 999px;
}
.delta-up { background: var(--success-soft); color: var(--success); }
.delta-down { background: var(--danger-soft); color: var(--danger); }

.table { width: 100%; border-collapse: collapse; }
.table thead th {
  text-align: left; padding: 12px 14px;
  font-size: 11px; font-weight: 600; color: var(--sub);
  text-transform: uppercase; letter-spacing: 0.06em;
  background: var(--card-2); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 5; white-space: nowrap;
}
/* Striped rows — alternating backgrounds for readability in dark + light mode */
.table tbody tr:nth-child(odd)  { background: var(--card); }
.table tbody tr:nth-child(even) { background: var(--stripe); }
.table tbody tr {
  transition: background 0.15s;
  cursor: pointer;
}
.table tbody tr:hover { background: var(--hover); }
.table tbody td {
  padding: 14px; font-size: 14px;
  border-bottom: 1px solid var(--border);
}
/* Rounded corners on first/last row so the table looks like a contained card */
.table tbody tr:first-child td:first-child { border-top-left-radius: 12px; }
.table tbody tr:first-child td:last-child { border-top-right-radius: 12px; }
.table tbody tr:last-child td:first-child { border-bottom-left-radius: 12px; }
.table tbody tr:last-child td:last-child { border-bottom-right-radius: 12px; }
.table tbody tr:last-child td { border-bottom: none; }

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 11px; border-radius: 999px;
  font-size: 12px; font-weight: 600; border: 1px solid; white-space: nowrap;
}
.chip::before {
  content: ''; width: 7px; height: 7px; border-radius: 50%;
  background: currentColor; box-shadow: 0 0 8px currentColor;
}
.chip-success { background: var(--success-soft); color: var(--success); border-color: rgba(34,197,94,0.25); }
.chip-primary { background: var(--primary-soft); color: var(--primary); border-color: rgba(37,99,235,0.25); }
.chip-accent { background: var(--accent-soft); color: var(--accent); border-color: rgba(6,182,212,0.25); }
.chip-warning { background: var(--warning-soft); color: var(--warning); border-color: rgba(245,158,11,0.25); }
.chip-danger { background: var(--danger-soft); color: var(--danger); border-color: rgba(239,68,68,0.25); }
.chip-neutral { background: var(--hover); color: var(--sub); border-color: var(--border); }

.input {
  width: 100%; padding: 10px 14px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-size: 14px; font-family: inherit; outline: none;
  transition: all 0.2s;
}
.input::placeholder { color: var(--muted); }
.input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
select.input {
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394A3B8' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 10px center;
  background-size: 14px;
  padding-right: 30px;
  width: 100%;
  min-width: 0;
}
[data-theme="light"] select.input {
  background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
}
select.input option {
  background: var(--card);
  color: var(--text);
  padding: 10px 12px;
}
/* MOBILE FIX: On iOS, appearance:none + custom arrow + padding-right narrows the
   select's text area and causes option text to truncate. On mobile we revert to
   the NATIVE iOS select rendering — no custom arrow, no padding-right, full text
   width. iOS's native chevron is used instead. Desktop keeps the custom arrow. */
@media (max-width: 768px) {
  select.input {
    appearance: auto;
    -webkit-appearance: auto;
    -moz-appearance: auto;
    background-image: none !important;
    padding-right: 12px !important;
  }
}
/* MOBILE FIX: Cap the search bar width so the greeting is visible on iPhone.
   Without this, flex:1 1 auto makes the search bar greedily fill all leftover
   space, pushing the greeting off-screen. */
@media (max-width: 768px) {
  .cmd-trigger-topbar { flex: 0 1 auto !important; max-width: 110px !important; min-width: 60px !important; }
}

.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(7,11,23,0.7);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: fadeIn 0.15s ease-out;
}
[data-theme="light"] .modal-backdrop { background: rgba(15,23,42,0.4); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-content {
  background: var(--card); border: 1px solid var(--border-strong);
  border-radius: 16px; box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  width: 100%; overflow: hidden;
  animation: modalIn 0.22s cubic-bezier(0.16,1,0.3,1);
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.96) translateY(-12px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.cmd-backdrop {
  position: fixed; inset: 0;
  background: rgba(7,11,23,0.7); backdrop-filter: blur(8px);
  z-index: 100; display: flex; align-items: flex-start; justify-content: center;
  padding-top: 12vh; animation: fadeIn 0.15s ease-out;
}
[data-theme="light"] .cmd-backdrop { background: rgba(15,23,42,0.4); }
.cmd-modal {
  width: 100%; max-width: 580px;
  background: var(--card); border: 1px solid var(--border-strong);
  border-radius: 16px; box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  overflow: hidden; animation: modalIn 0.22s cubic-bezier(0.16,1,0.3,1);
}
.cmd-result {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px; cursor: pointer; transition: background 0.15s;
}
.cmd-result:hover, .cmd-result.selected { background: var(--hover); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
.fade-up { animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both; }
.slide-in { animation: slideIn 0.5s cubic-bezier(0.16,1,0.3,1) both; }

@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.6); } 50% { box-shadow: 0 0 0 7px rgba(239,68,68,0); } }
.notif-dot {
  position: absolute; top: 8px; right: 8px;
  width: 8px; height: 8px; background: var(--danger);
  border-radius: 50%; border: 2px solid var(--card);
  animation: pulse 2s infinite;
}
@keyframes logoGlow {
  0%,100% { box-shadow: 0 0 24px var(--primary-glow), 0 0 48px var(--primary-glow); transform: scale(1); }
  50% { box-shadow: 0 0 36px var(--primary-glow), 0 0 64px var(--primary-glow); transform: scale(1.06); }
}
@keyframes logoShimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.logo-glow {
  animation: logoGlow 2s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}
.logo-glow::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.7) 50%, transparent 65%);
  background-size: 200% 100%;
  animation: logoShimmer 2s linear infinite;
  border-radius: inherit;
  pointer-events: none;
}

.fab {
  position: fixed; bottom: calc(84px + env(safe-area-inset-bottom)); right: 20px;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--primary-grad); color: white; border: none; cursor: pointer;
  box-shadow: 0 12px 32px var(--primary-glow);
  display: flex; align-items: center; justify-content: center;
  z-index: 45; transition: transform 0.2s;
}
.fab:hover { transform: scale(1.08) rotate(90deg); }
.fab:active { transform: scale(0.95); }

/* Bottom nav (replaces sidebar entirely) — Dashboard + Orders */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
  background: var(--sidebar); border-top: 1px solid var(--border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding: 10px 16px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  display: flex; gap: 10px; justify-content: center;
}
.nav-btn {
  flex: 1; max-width: 220px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 14px 20px; border-radius: 14px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  border: 1px solid var(--border); transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
  color: var(--sub); background: var(--card);
  font-family: inherit; position: relative; overflow: hidden;
}
.nav-btn:hover { border-color: var(--border-strong); color: var(--text); transform: translateY(-1px); }
.nav-btn.active {
  background: var(--primary-grad); color: white; border-color: transparent;
  box-shadow: 0 8px 24px var(--primary-glow), 0 0 0 1px rgba(255,255,255,0.1) inset;
  animation: navBreath 2s ease-in-out infinite;
  transform: translateY(-4px);
  box-shadow: 0 12px 32px var(--primary-glow), 0 0 0 1px rgba(255,255,255,0.15) inset, 0 0 48px var(--primary-glow);
}
.nav-btn.active::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.5) 50%, transparent 65%);
  background-size: 200% 100%;
  animation: navShimmer 2s linear infinite;
  border-radius: inherit;
  pointer-events: none;
}
@keyframes navBreath {
  0%,100% { transform: translateY(-4px) scale(1); box-shadow: 0 12px 32px var(--primary-glow), 0 0 0 1px rgba(255,255,255,0.15) inset, 0 0 48px var(--primary-glow); }
  50% { transform: translateY(-6px) scale(1.03); box-shadow: 0 16px 40px var(--primary-glow), 0 0 0 1px rgba(255,255,255,0.2) inset, 0 0 64px var(--primary-glow); }
}
@keyframes navShimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* Liquid text effect for Madinah Area label */
.liquid-text {
  background: linear-gradient(90deg, #2563EB, #06B6D4, #22C55E, #06B6D4, #2563EB);
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: liquidFlow 3s linear infinite;
  font-weight: 800;
  letter-spacing: 0.02em;
}
@keyframes liquidFlow {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}

@media (max-width: 768px) {
  .header-greeting { display: none; }
}

/* Safe-area fixes for iOS Dynamic Island / notch / home indicator */
.safe-top { padding-top: env(safe-area-inset-top); }
.safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--sub); }
.tabular-nums { font-variant-numeric: tabular-nums; }
button, nav, aside { -webkit-user-select: none; user-select: none; }
.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--primary-grad);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: white;
  border: 2px solid var(--card);
}
.scroll-thin::-webkit-scrollbar { width: 6px; }
</style>
</head>
<body>

<noscript>
  <div style="padding: 2rem; text-align: center; font-family: sans-serif; color: #333;">
    <h1>JavaScript Required</h1>
    <p>Century Gate Order Tracker needs JavaScript to function. Please enable it in your browser.</p>
  </div>
</noscript>

<div id="app" class="flex min-h-screen" style="position: relative; z-index: 1; padding-top: env(safe-area-inset-top);"></div>

<!-- Sidebar overlay (mobile) -->
<div id="sidebar-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:35;" onclick="toggleSidebar()"></div>

<!-- FAB (mobile only) -->
<button class="fab" onclick="openCreateForm()" aria-label="New Order"><i data-lucide="plus" class="w-6 h-6"></i></button>

<!-- Command palette -->
<div id="cmd-backdrop" class="cmd-backdrop" style="display:none;" onclick="if(event.target===this)closeCmdPalette()">
  <div class="cmd-modal">

function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

const STORAGE_KEY = 'century-gate-orders';
const THEME_KEY = 'century-gate-theme';

function loadOrders() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    try { state.orders = JSON.parse(stored); return; }
    catch (e) { console.warn('Failed to parse stored orders, re-seeding', e); }
  }
  state.orders = SEED_ORDERS.map(o => ({ ...o }));
  saveOrders();
}

function saveOrders() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state.orders));
}

function loadTheme() {
  const t = localStorage.getItem(THEME_KEY);
  if (t === 'light' || t === 'dark') state.theme = t;
  document.documentElement.setAttribute('data-theme', state.theme);
}

function saveTheme() {
  localStorage.setItem(THEME_KEY, state.theme);
}

function getNextOrderId() {
  let maxN = 0;
  for (const o of state.orders) {
    const m = /^ORD-(\d+)$/i.exec(o.orderId || '');
    if (m) { const n = parseInt(m[1], 10); if (n > maxN) maxN = n; }
  }
  return 'ORD-' + String(maxN + 1).padStart(3, '0');
}

function createOrder(data) {
  const newOrder = { ...data };
  state.orders.unshift(newOrder);
  saveOrders();
  return newOrder;
}

function updateOrder(orderId, data) {
  const idx = state.orders.findIndex(o => o.orderId === orderId);
  if (idx === -1) return null;
  state.orders[idx] = { ...state.orders[idx], ...data };
  saveOrders();
  return state.orders[idx];
}

function deleteOrder(orderId) {
  state.orders = state.orders.filter(o => o.orderId !== orderId);
  saveOrders();
}

function getFilteredOrders() {
  let filtered = [...state.orders];
  if (state.search) {
    const q = state.search.toLowerCase();
    filtered = filtered.filter(o =>
      (o.orderId || '').toLowerCase().includes(q) ||
      (o.customerName || '').toLowerCase().includes(q) ||
      (o.customerNumber || '').toLowerCase().includes(q) ||
      (o.description || '').toLowerCase().includes(q)
    );
  }
  if (state.filterProduction) filtered = filtered.filter(o => o.productionStatus === state.filterProduction);
  if (state.filterInvoice) filtered = filtered.filter(o => o.invoiceStatus === state.filterInvoice);
  const sortMap = {
    orderId: 'orderId', orderDate: 'orderDate', customer: 'customerName',
    productType: 'productType', quantity: 'quantity', totalValue: 'totalValue',
    deadline: 'deadline', productionStatus: 'productionStatus',
    deliveryStatus: 'deliveryStatus', paymentStatus: 'paymentSummary',
  };
  const field = sortMap[state.sortBy] || 'orderDate';
  const dir = state.sortDir === 'asc' ? 1 : -1;
  filtered.sort((a, b) => {
    let av = a[field], bv = b[field];
    if (av == null) av = '';
    if (bv == null) bv = '';
    if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * dir;
    return String(av).localeCompare(String(bv)) * dir;
  });
  return filtered;
}

function getStats() {
  const all = state.orders;
  const total = all.length;
  const totalValue = all.reduce((s, o) => s + (o.totalValue || 0), 0);
  const delivered = all.filter(o => o.deliveryStatus === 'Fully Delivered').length;
  const newOrders = all.filter(o => (o.orderType || '').trim() === 'New Order').length;
  const reorders = all.filter(o => (o.orderType || '').trim() === 'Reorder').length;
  const totalCliche = all.reduce((s, o) => s + (o.clicheValue || 0), 0);
  const pending = all.filter(o => o.productionStatus === 'Pending' || o.productionStatus === 'In Progress').length;
  const productionPct = total > 0 ? Math.round((all.filter(o => o.productionStatus === 'Completed').length / total) * 100) : 0;

  function breakdown(field) {
    const map = {};
    for (const o of all) { const k = o[field] || 'Unknown'; map[k] = (map[k] || 0) + 1; }
    return Object.entries(map).map(([label, count]) => ({ label, count, pct: total ? count / total : 0 })).sort((a, b) => b.count - a.count);
  }

  const prodMap = {};
  for (const o of all) {
    const k = o.productType || 'Unknown';
    if (!prodMap[k]) prodMap[k] = { orders: 0, totalValue: 0 };
    prodMap[k].orders++;
    prodMap[k].totalValue += o.totalValue || 0;
  }
  const salesByProduct = Object.entries(prodMap).map(([productType, v]) => ({ productType, ...v, pct: v.totalValue / (totalValue || 1) })).sort((a, b) => b.totalValue - a.totalValue);

  const custMap = {};
  for (const o of all) {
    const k = o.customerName || 'Unknown';
    if (!custMap[k]) custMap[k] = { customerName: k, customerNumber: o.customerNumber, orders: 0, totalValue: 0 };
    custMap[k].orders++;
    custMap[k].totalValue += o.totalValue || 0;
    if (!custMap[k].customerNumber && o.customerNumber) custMap[k].customerNumber = o.customerNumber;
  }
  const topCustomers = Object.values(custMap).map(c => ({ ...c, avgOrder: c.orders > 0 ? c.totalValue / c.orders : 0 })).sort((a, b) => b.totalValue - a.totalValue).slice(0, 10);

  const monthMap = {};
  for (const o of all) {
    if (!o.orderDate) continue;
    const d = new Date(o.orderDate);
    if (isNaN(d.getTime())) continue;
    const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    if (!monthMap[key]) monthMap[key] = { orders: 0, value: 0, ts: d.getTime() };
    monthMap[key].orders++;
    monthMap[key].value += o.totalValue || 0;
  }
  const monthlyTrend = Object.entries(monthMap).sort((a, b) => a[1].ts - b[1].ts).map(([key, v]) => {
    const [y, m] = key.split('-');
    const d = new Date(parseInt(y), parseInt(m) - 1, 1);
    return { month: d.toLocaleDateString('en-GB', { month: 'short', year: '2-digit' }), orders: v.orders, value: v.value };
  });

  const recentOrders = [...all].sort((a, b) => new Date(b.orderDate || 0) - new Date(a.orderDate || 0)).slice(0, 6);
  const overdueOrders = all.filter(o => isOverdue(o.deadline, o.deliveryStatus));

  return {
    totalOrders: total, totalValue, delivered, newOrders, reorders, totalCliche,
    pending, productionPct,
    productionBreakdown: breakdown('productionStatus'),
    deliveryBreakdown: breakdown('deliveryStatus'),
    invoiceBreakdown: breakdown('invoiceStatus'),
    paymentBreakdown: breakdown('paymentSummary'),
    salesByProduct, topCustomers, monthlyTrend, recentOrders, overdueOrders,
  };
}

// ============================================================
// FORMATTERS
// ============================================================
function formatSAR(value, decimals = 2) {
  if (value == null || isNaN(value)) return '—';
  return 'SAR ' + Number(value).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function formatSARShort(value) {
  if (value == null || isNaN(value)) return '—';
  if (Math.abs(value) >= 1e6) return 'SAR ' + (value / 1e6).toFixed(2) + 'M';
  if (Math.abs(value) >= 1e3) return 'SAR ' + (value / 1e3).toFixed(1) + 'K';
  return 'SAR ' + value.toFixed(0);
}
function formatNumber(value, decimals = 0) {
  if (value == null || isNaN(value)) return '—';
  return Number(value).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '—';
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}
function isOverdue(deadline, deliveryStatus) {
  if (!deadline) return false;
  if (deliveryStatus === 'Fully Delivered') return false;
  return new Date(deadline).getTime() < Date.now();
}

// STATUS CHIP HELPERS (premium version)
// ============================================================
function statusChipClass(value) {
  if (!value) return 'chip chip-neutral';
  const v = value.trim();
  const goodStatuses = ['Completed', 'Fully Delivered', 'Invoiced', 'Fully Paid', '50% Advance Paid'];
  const warnStatuses = ['In Progress', 'Partially Delivered'];
  const badStatuses = ['Not Shipped', 'No Payment'];
  const neutralStatuses = ['Pending', 'Not Invoiced', 'Reorder'];
  if (goodStatuses.includes(v)) return 'chip chip-success';
  if (warnStatuses.includes(v)) return 'chip chip-warning';
  if (badStatuses.includes(v)) return 'chip chip-danger';
  if (neutralStatuses.includes(v)) return 'chip chip-neutral';
  if (v === 'New Order') return 'chip chip-primary';
  return 'chip chip-neutral';
}
function statusChip(value) {
  if (!value) return '<span style="color:var(--muted)">—</span>';

}
function productChip(value) {
  if (!value) return '<span style="color:var(--muted)">—</span>';
  const meta = productMeta(value);
  return '<span class="chip" style="background: ' + meta.bg + '; color: ' + meta.fg + '; border-color: ' + meta.bd + '"><i data-lucide="' + meta.icon + '" class="w-3 h-3"></i>' + value + '</span>';
}

// ============================================================
// PRODUCT TYPE METADATA — icon + color per product type
// ============================================================
function productMeta(productType) {
  const v = (productType || '').trim();
  const map = {
    'Printed Paper Bags': { icon: 'shopping-bag', color: '#2563EB' },
    'Printed Boxes':      { icon: 'package',      color: '#8B5CF6' },
    'Printed Cups':       { icon: 'coffee',       color: '#06B6D4' },
    'Printed Napkins':    { icon: 'sticky-note',  color: '#F59E0B' },
    'Printed Sheet':      { icon: 'file-text',    color: '#22C55E' },
    'Plain Items':        { icon: 'circle',       color: '#64748B' },
  };
  const m = map[v] || { icon: 'tag', color: '#64748B' };
  const hex = m.color.replace('#', '');
  const r = parseInt(hex.slice(0,2), 16), g = parseInt(hex.slice(2,4), 16), b = parseInt(hex.slice(4,6), 16);
  return {
    icon: m.icon,
    color: m.color,
    fg: m.color,
    bg: 'rgba(' + r + ',' + g + ',' + b + ',0.14)',
    bd: 'rgba(' + r + ',' + g + ',' + b + ',0.30)',
  };
}

  el.innerHTML = '<div class="kpi-icon ' + (isErr ? 'icon-danger' : 'icon-success') + '" style="width:28px;height:28px;flex-shrink:0;"><i data-lucide="' + (isErr ? 'alert-circle' : 'check-circle') + '" class="w-4 h-4"></i></div><div><div style="font-weight:600;font-size:14px;">' + title + '</div>' + (description ? '<div style="font-size:12px;color:var(--sub);margin-top:2px;">' + description + '</div>' : '') + '</div>';

// ============================================================
// RENDER — main entry point
// ============================================================
function render() {
  const activeEl = document.activeElement;
  const focusId = activeEl && activeEl.id ? activeEl.id : null;
  const focusName = activeEl && activeEl.name ? activeEl.name : null;
  const selectionStart = activeEl && activeEl.selectionStart != null ? activeEl.selectionStart : null;
  const selectionEnd = activeEl && activeEl.selectionEnd != null ? activeEl.selectionEnd : null;
  const scrollY = window.scrollY;

  requestAnimationFrame(() => {
    const app = document.getElementById('app');
    const viewChanged = (app.dataset.view || '') !== state.view;
    const shellExists = document.getElementById('main-content') !== null;

    if (viewChanged || !shellExists) {
      // FULL SHELL REBUILD — only on view switch or first load.
      // This is the only path that touches sidebar + topbar, so the sidebar
      // state and overlay never get out of sync on filter/sort/search changes.
      app.innerHTML = renderShell();
      app.dataset.view = state.view;
      renderMainContent();
      renderModals();
      if (window.lucide) lucide.createIcons();
      if (state.view === 'dashboard') {
        renderDashboardCharts();
        // Animated counters — only animate on first load.
        if (!state.countersAnimated) {
          animateCounters(false);
          state.countersAnimated = true;
        } else {
          animateCounters(true);
        }
      }
    } else {
      // PARTIAL UPDATE — only re-render content + modals.
      // Sidebar + topbar persist untouched → no white flash, no sidebar close bug.
      renderMainContent();
      renderModals();
      // Full lucide icon scan on every render. We previously tried scoping this
      // to #main-content / #modal-container for performance, but the scoped scan
      // silently failed on some lucide builds — leaving topbar icons (☰ menu,
      // + New Order, bell, theme toggle) as invisible raw <i> elements.
      // A full scan is fast enough and guarantees every icon gets processed.
      if (window.lucide) lucide.createIcons();
      // Charts: only rebuild if we're on dashboard (they don't depend on order filters,
      // but they DO depend on order data which changes when orders are created/edited/deleted).
      // We detect this by checking if the chart canvases exist but data may have changed.
      // For now, only rebuild charts on view change (handled above) to avoid lag.
      // Charts will refresh when user switches to dashboard view.
    }

    syncSidebarState();
    attachEventListeners();

    // Restore focus + selection
    if (focusId) {
      const restored = document.getElementById(focusId);
      if (restored) {
        restored.focus();
        if (selectionStart != null && selectionEnd != null) {
          try { restored.setSelectionRange(selectionStart, selectionEnd); } catch (e) {}
        }
      }
    } else if (focusName) {
      const restored = document.querySelector('[name="' + focusName + '"]');
      if (restored) {
        restored.focus();
        if (selectionStart != null && selectionEnd != null) {
          try { restored.setSelectionRange(selectionStart, selectionEnd); } catch (e) {}
        }
      }
    }
    window.scrollTo(0, scrollY);
  });
}

// ============================================================
// ANIMATED COUNTERS
// instant=true → set final value immediately (no animation)
// instant=false → count up from 0 to target over ~1.4s
// ============================================================
function animateCounters(instant) {
  document.querySelectorAll('[data-count]').forEach(el => {
    const target = parseFloat(el.dataset.count);
    const prefix = el.dataset.prefix || '';
    const suffix = el.dataset.suffix || '';
    const isShort = el.dataset.short === 'true';
    const finalText = prefix + (isShort ? formatShort(target) : target) + suffix;
    if (instant) {
      el.textContent = finalText;
      return;
    }
    const duration = 1400;
    const start = performance.now();
    function tick(now) {
      const t = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      const val = Math.floor(target * eased);
      el.textContent = prefix + (isShort ? formatShort(val) : val) + suffix;
      if (t < 1) requestAnimationFrame(tick);
      else el.textContent = finalText;
    }
    requestAnimationFrame(tick);
  });
}
function formatShort(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

                <h3 class="font-semibold flex items-center gap-2 mb-1" style="color: var(--text);"><i data-lucide="pie-chart" class="w-4 h-4" style="color: var(--accent);"></i> Sales by Product Type</h3>
                <p class="text-xs mb-4" style="color: var(--sub);">Revenue distribution across categories</p>
                <div style="height: 200px;"><canvas id="productChart"></canvas></div>
                <div class="space-y-1.5 mt-3">
                  ${s.salesByProduct.slice(0, 5).map((p, i) => {
                    const meta = productMeta(p.productType);
                    return `
                      <button onclick="goToOrdersWithProduct('${p.productType.replace(/'/g, "\\'")}')" class="w-full flex items-center gap-2 px-2 py-1.5 rounded-md transition-colors text-left" style="color: var(--sub);" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background='transparent'">
                        <span class="w-2.5 h-2.5 rounded-sm shrink-0" style="background:${meta.color}"></span>
                        <i data-lucide="${meta.icon}" class="w-3 h-3 shrink-0" style="color:${meta.color}"></i>
                        <span class="text-xs flex-1 truncate" style="color: var(--text);">${esc(p.productType)}</span>
                        <span class="text-xs font-semibold tabular-nums">${(p.pct * 100).toFixed(1)}%</span>
                      </button>
                    `;
                  }).join('')}
                </div>
              </div>
            </div>

            <!-- Status breakdowns -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
              ${renderStatusCard('Production Status', s.productionBreakdown)}
              ${renderStatusCard('Delivery Status', s.deliveryBreakdown)}
              ${renderStatusCard('Invoice Status', s.invoiceBreakdown)}
              ${renderStatusCard('Payment Status', s.paymentBreakdown)}
            </div>

            <!-- Top customers + Recent orders -->
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-4">
              <div class="card p-6 lg:col-span-2 fade-up" style="animation-delay:0.45s;">
                <h3 class="font-semibold text-base mb-1" style="color: var(--text);">Top Customers</h3>
                <p class="text-xs mb-3" style="color: var(--sub);">By total order value (SAR)</p>
                <div class="space-y-1">
                  ${s.topCustomers.slice(0, 8).map((c, i) => `
                    <button onclick="goToOrdersWithCustomer('${c.customerName.replace(/'/g, "\\'")}')" class="w-full flex items-center gap-3 px-2 py-2 rounded-md transition-colors text-left" style="color: var(--sub);" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background='transparent'">
                      <span class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shrink-0 text-white" style="background:${i === 0 ? 'var(--primary)' : i === 1 ? 'var(--accent)' : i === 2 ? 'var(--success)' : 'var(--muted)'}">${i + 1}</span>
                      <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium truncate" style="color: var(--text);">${esc(c.customerName)}</p>
                        <p class="text-[11px]" style="color: var(--sub);">${c.orders} orders · avg ${formatSARShort(c.avgOrder)}</p>
                      </div>
                      <span class="text-sm font-semibold tabular-nums" style="color: var(--text);">${formatSARShort(c.totalValue)}</span>
                    </button>
                  `).join('')}
                </div>
              </div>
              <div class="card p-6 lg:col-span-3 fade-up" style="animation-delay:0.5s;">
                <h3 class="font-semibold text-base mb-1" style="color: var(--text);">Recent Orders</h3>
                <p class="text-xs mb-3" style="color: var(--sub);">Latest 6 orders — click to view detail</p>
                <div class="space-y-1">
                  ${s.recentOrders.map(o => {
                    const overdue = isOverdue(o.deadline, o.deliveryStatus);
                    return `
                      <button onclick="openOrderDetail('${esc(o.orderId)}')" class="w-full flex items-center gap-3 px-2 py-2 rounded-md transition-colors text-left" style="border-bottom: 1px solid var(--border);" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background='transparent'">
                        <i data-lucide="${overdue ? 'alert-triangle' : 'clock'}" class="w-3.5 h-3.5 shrink-0" style="color: ${overdue ? 'var(--danger)' : 'var(--muted)'}"></i>
                        <div class="w-20 shrink-0">
                          <p class="text-xs font-mono font-semibold" style="color: var(--primary);">${esc(o.orderId)}</p>
                          <p class="text-[10px]" style="color: var(--sub);">${formatDate(o.orderDate)}</p>
                        </div>
                        <div class="flex-1 min-w-0">
                          <p class="text-sm font-medium truncate" style="color: var(--text);">${esc(o.customerName) || ''}</p>
                          <p class="text-[11px] truncate" style="color: var(--sub);">${esc(o.description) || ''}</p>
                        </div>
                        <div class="text-right shrink-0 w-24">
                          <p class="text-sm font-semibold tabular-nums" style="color: var(--text);">${formatSARShort(o.totalValue)}</p>
                          ${overdue ? '<p class="text-[10px]" style="color: var(--danger);">Overdue</p>' : ''}
                        </div>
                      </button>
                    `;
                  }).join('')}
                </div>
              </div>
            </div>
  `;
}

function renderStatusCard(title, data) {
  return `
    <div class="card p-6 fade-up">
      <h3 class="text-sm font-semibold mb-3" style="color: var(--text);">${title}</h3>
      <div class="space-y-2">
        ${data.map(row => `
          <div class="space-y-1">
            <div class="flex items-center justify-between text-xs">
              ${statusChip(row.label)}
              <span class="font-semibold tabular-nums" style="color: var(--text);">${row.count} <span style="color: var(--muted); font-weight: 400;">· ${(row.pct * 100).toFixed(1)}%</span></span>
            </div>
            <div style="height:6px; background:var(--hover); border-radius:999px; overflow:hidden;">
              <div style="width:${row.pct * 100}%; height:100%; background:var(--primary-grad); border-radius:999px;"></div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderDashboardCharts() {
  const s = getStats();
  const isDark = state.theme === 'dark';
  const PRODUCT_COLORS = s.salesByProduct.map(p => productMeta(p.productType).color);

  Chart.defaults.color = isDark ? '#94A3B8' : '#475569';
  Chart.defaults.borderColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(15,23,42,0.06)';
  Chart.defaults.font.family = "'Inter', sans-serif";

  Object.values(charts).forEach(c => { if (c) c.destroy(); });
  charts = {};

  const trendCtx = document.getElementById('trendChart');
  if (trendCtx) {
    const ctx = trendCtx.getContext('2d');
    const g1 = ctx.createLinearGradient(0, 0, 0, 260);
    g1.addColorStop(0, 'rgba(37,99,235,0.5)');
    g1.addColorStop(1, 'rgba(37,99,235,0)');
    const g2 = ctx.createLinearGradient(0, 0, 0, 260);
    g2.addColorStop(0, 'rgba(6,182,212,0.5)');
    g2.addColorStop(1, 'rgba(6,182,212,0)');
    charts.trend = new Chart(trendCtx, {
      type: 'line',
      data: {
        labels: s.monthlyTrend.map(m => m.month),
        datasets: [
          { label: 'Orders', data: s.monthlyTrend.map(m => m.orders), borderColor: '#2563EB', backgroundColor: g1, fill: true, tension: 0.4, borderWidth: 3, pointBackgroundColor: '#2563EB', pointBorderColor: isDark ? '#070B17' : '#FFFFFF', pointBorderWidth: 3, pointRadius: 5, pointHoverRadius: 8, yAxisID: 'y' },
          { label: 'Value (SAR)', data: s.monthlyTrend.map(m => m.value), borderColor: '#06B6D4', backgroundColor: g2, fill: true, tension: 0.4, borderWidth: 3, pointBackgroundColor: '#06B6D4', pointBorderColor: isDark ? '#070B17' : '#FFFFFF', pointBorderWidth: 3, pointRadius: 5, pointHoverRadius: 8, yAxisID: 'y1' }
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false, devicePixelRatio: Math.min(window.devicePixelRatio || 1, 2),
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: isDark ? 'rgba(17,24,39,0.95)' : 'rgba(255,255,255,0.98)', titleColor: isDark ? '#FFFFFF' : '#0F172A', bodyColor: isDark ? '#94A3B8' : '#475569', borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(15,23,42,0.08)', borderWidth: 1, padding: 12, cornerRadius: 10, displayColors: true, boxPadding: 6, titleFont: { weight: '700', size: 13 }, bodyFont: { size: 12 } }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: isDark ? '#64748B' : '#94A3B8' } },
          y: { position: 'left', beginAtZero: true, grid: { color: isDark ? 'rgba(255,255,255,0.04)' : 'rgba(15,23,42,0.04)' }, ticks: { color: isDark ? '#64748B' : '#94A3B8' } },
          y1: { position: 'right', beginAtZero: true, grid: { drawOnChartArea: false }, ticks: { color: isDark ? '#64748B' : '#94A3B8', callback: v => (v / 1000).toFixed(0) + 'K' } }
        },
        animation: { duration: 1400, easing: 'easeOutQuart' }
      }
    });
  }

  const pieCtx = document.getElementById('productChart');
  if (pieCtx) {
    charts.pie = new Chart(pieCtx, {
      type: 'doughnut',
      data: {
        labels: s.salesByProduct.map(p => p.productType),
        datasets: [{ data: s.salesByProduct.map(p => p.totalValue), backgroundColor: PRODUCT_COLORS, borderColor: isDark ? '#111827' : '#FFFFFF', borderWidth: 4, hoverOffset: 14 }],
      },
      options: {
        responsive: true, maintainAspectRatio: false, devicePixelRatio: Math.min(window.devicePixelRatio || 1, 2), cutout: '68%',
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: isDark ? 'rgba(17,24,39,0.95)' : 'rgba(255,255,255,0.98)', titleColor: isDark ? '#FFFFFF' : '#0F172A', bodyColor: isDark ? '#94A3B8' : '#475569', borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(15,23,42,0.08)', borderWidth: 1, padding: 12, cornerRadius: 10, callbacks: { label: ctx => formatSAR(ctx.parsed) } }
        },
        animation: { animateRotate: true, animateScale: true, duration: 1400, easing: 'easeOutQuart' }
      }
    });
  }
}

function renderOrdersContent() {
  const filtered = getFilteredOrders();
  const total = filtered.length;
  const totalPages = Math.ceil(total / state.pageSize) || 1;
  if (state.page > totalPages) state.page = totalPages;
  if (state.page < 1) state.page = 1;
  const start = (state.page - 1) * state.pageSize;
  const pageData = filtered.slice(start, start + state.pageSize);

  const unique = (field) => { const s = new Set(); for (const o of state.orders) { if (o[field]) s.add(String(o[field]).trim()); } return Array.from(s).sort(); };
  const customers = unique('customerName');
  const productTypes = unique('productType');
  const orderTypes = unique('orderType');
  const prodStatuses = unique('productionStatus').filter(s => s !== 'Pending');
  const invStatuses = unique('invoiceStatus');
  const delStatuses = unique('deliveryStatus').filter(s => s !== 'Partially Delivered');

  const activeFilterCount = [state.filterProduction, state.filterInvoice].filter(Boolean).length;

  const sortIcon = (field) => {
    if (state.sortBy !== field) return '<i data-lucide="arrow-up-down" class="w-3 h-3" style="opacity:0.4"></i>';
    return state.sortDir === 'asc' ? '<i data-lucide="arrow-up" class="w-3 h-3" style="color: var(--primary);"></i>' : '<i data-lucide="arrow-down" class="w-3 h-3" style="color: var(--primary);"></i>';
  };

  return `
<div class="fade-up">
              <h1 class="text-2xl md:text-3xl font-extrabold mb-1" style="color: var(--text); letter-spacing: -0.02em;">Orders</h1>
              <p class="text-sm" style="color: var(--sub);">Search, filter and track all customer orders</p>
            </div>

            <!-- Search + actions -->
            <div class="card p-5 fade-up">
              <div class="flex flex-col md:flex-row gap-3">
                <div class="relative flex-1">
                  <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4" style="color: var(--sub);"></i>
                  <input id="search-input" type="text" aria-label="Search orders" value="${state.search.replace(/"/g, '&quot;')}" placeholder="Search by order ID, customer, description..." class="input" style="padding-left: 38px;">
                </div>
                <button onclick="toggleFilters()" aria-label="Toggle filters" class="btn ${state.showFilters ? 'btn-primary' : 'btn-ghost'} shrink-0">
                  <i data-lucide="filter" class="w-4 h-4"></i> Filters
                  ${activeFilterCount > 0 ? '<span class="badge-count" style="margin-left:4px;">' + activeFilterCount + '</span>' : ''}
                </button>
                <button onclick="exportPDF()" id="pdf-btn" aria-label="Export to PDF" class="btn btn-ghost shrink-0" title="Export current filtered orders as PDF">
                  <i data-lucide="file-text" class="w-4 h-4"></i>
                  <span>Export PDF</span>
                </button>
              </div>

              ${state.showFilters ? `
                <div class="mt-4 pt-4 border-t grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-3" style="border-color: var(--border);">
                  ${filterSelect('Production', 'filterProduction', prodStatuses)}
                  ${filterSelect('Invoice', 'filterInvoice', invStatuses)}
                  ${activeFilterCount > 0 ? '<div class="flex items-end"><button onclick="clearFilters()" class="btn btn-ghost text-sm"><i data-lucide="x" class="w-3.5 h-3.5"></i> Clear all</button></div>' : ''}
                </div>
              ` : ''}
            </div>

            <!-- Table -->
            <div class="card overflow-hidden fade-up">
              <div class="overflow-x-auto scroll-thin">
                <table class="table">
                  <thead>
                    <tr>
                      <th class="w-24"><button onclick="toggleSort('orderId')" class="flex items-center gap-1 font-semibold">Order ID ${sortIcon('orderId')}</button></th>
                      <th class="w-28"><button onclick="toggleSort('orderDate')" class="flex items-center gap-1 font-semibold">Date ${sortIcon('orderDate')}</button></th>
                      <th class="min-w-[140px]"><button onclick="toggleSort('customer')" class="flex items-center gap-1 font-semibold">Customer ${sortIcon('customer')}</button></th>
                      <th class="min-w-[140px]"><button onclick="toggleSort('productType')" class="flex items-center gap-1 font-semibold">Product ${sortIcon('productType')}</button></th>
                      <th class="min-w-[180px]">Description</th>
                      <th class="text-right w-24"><button onclick="toggleSort('quantity')" class="flex items-center gap-1 font-semibold ml-auto">Qty ${sortIcon('quantity')}</button></th>
                      <th class="text-right w-28">Unit Price</th>
                      <th class="text-right w-32"><button onclick="toggleSort('totalValue')" class="flex items-center gap-1 font-semibold ml-auto">Total ${sortIcon('totalValue')}</button></th>
                      <th class="w-28"><button onclick="toggleSort('deadline')" class="flex items-center gap-1 font-semibold">Deadline ${sortIcon('deadline')}</button></th>
                      <th class="min-w-[120px]">Production</th>
                      <th class="min-w-[120px]">Invoice</th>
                      <th class="min-w-[120px]">Delivery</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${pageData.length === 0 ? '<tr><td colspan="12" class="text-center py-12" style="color: var(--sub);">No orders match your filters. Try clearing some filters or search terms.</td></tr>' : pageData.map(o => {
                      const overdue = isOverdue(o.deadline, o.deliveryStatus);
                      return `
                        <tr onclick="openOrderDetail('${esc(o.orderId)}')">
                          <td class="font-mono text-xs font-bold whitespace-nowrap" style="color: var(--primary);">${esc(o.orderId)}</td>
                          <td class="text-xs whitespace-nowrap" style="color: var(--sub);">${formatDate(o.orderDate)}</td>
                          <td class="font-medium text-sm whitespace-nowrap" style="color: var(--text);">${esc(o.customerName) || '\u2014'}</td>
                          <td class="whitespace-nowrap">${productChip(o.productType)}</td>
                          <td class="text-xs max-w-[220px] truncate" style="color: var(--sub);">${esc(o.description) || '\u2014'}</td>
                          <td class="text-right text-xs tabular-nums whitespace-nowrap" style="color: var(--text);">${formatNumber(o.quantity)} <span style="color: var(--muted);">${o.qtyUnit || ''}</span></td>
                          <td class="text-right text-xs tabular-nums whitespace-nowrap" style="color: var(--text);">${o.unitPrice != null ? formatSAR(o.unitPrice) : '\u2014'}</td>
                          <td class="text-right font-semibold tabular-nums text-sm whitespace-nowrap" style="color: var(--text);">${formatSARShort(o.totalValue)}</td>
                          <td class="text-xs whitespace-nowrap">
                            <div class="flex items-center gap-1">
                              ${overdue ? '<i data-lucide="alert-triangle" class="w-3 h-3 shrink-0" style="color: var(--danger);"></i>' : ''}
                              <span style="color: ${overdue ? 'var(--danger)' : 'var(--sub)'}; ${overdue ? 'font-weight:500;' : ''}">${formatDate(o.deadline)}</span>
                            </div>
                          </td>
                          <td class="whitespace-nowrap">${statusChip(o.productionStatus)}</td>
                          <td class="whitespace-nowrap">${statusChip(o.invoiceStatus)}</td>
                          <td class="whitespace-nowrap">${statusChip(o.deliveryStatus)}</td>
                        </tr>
                      `;
                    }).join('')}
                  </tbody>
                </table>
              </div>

              <!-- Pagination -->
              <div class="flex flex-col sm:flex-row items-center justify-between gap-3 px-4 py-3 border-t" style="border-color: var(--border); background: var(--hover);">
                <p class="text-xs" style="color: var(--sub);">
                  Showing <span class="font-semibold" style="color: var(--text);">${total === 0 ? 0 : start + 1}</span> - <span class="font-semibold" style="color: var(--text);">${Math.min(start + state.pageSize, total)}</span> of <span class="font-semibold" style="color: var(--text);">${formatNumber(total)}</span> orders
                </p>
                <div class="flex items-center gap-1">
                  <button onclick="changePage(-1)" ${state.page <= 1 ? 'disabled' : ''} class="btn btn-ghost text-sm" style="${state.page <= 1 ? 'opacity:0.5;cursor:not-allowed;' : ''}"><i data-lucide="chevron-left" class="w-4 h-4"></i> Prev</button>
                  <span class="text-xs px-3 py-1.5 font-medium whitespace-nowrap" style="color: var(--sub);">Page ${state.page} / ${totalPages}</span>
                  <button onclick="changePage(1)" ${state.page >= totalPages ? 'disabled' : ''} class="btn btn-ghost text-sm" style="${state.page >= totalPages ? 'opacity:0.5;cursor:not-allowed;' : ''}">Next <i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                </div>
              </div>
            </div>
  `;
}

function filterSelect(label, stateKey, options) {
  const currentVal = state[stateKey];
  return `
    <div class="space-y-1.5">
      <label class="text-[11px] uppercase tracking-wide font-medium" style="color: var(--sub);">${label}</label>
      <select onchange="setFilter('${stateKey}', this.value)" class="input h-9 text-sm">
        <option value="">All</option>
        ${options.map(o => '<option value="' + o.replace(/"/g, '&quot;') + '"' + (o === currentVal ? ' selected' : '') + '>' + o + '</option>').join('')}
      </select>
    </div>
  `;
}

// ============================================================
// ORDER DETAIL MODAL
// ============================================================
function renderOrderDetailModal() {
  if (!state.selectedOrderId) return '';
  const order = state.orders.find(o => o.orderId === state.selectedOrderId);
  if (!order) return '';

  const leadTime = (order.orderDate && order.deadline) ? Math.round((new Date(order.deadline) - new Date(order.orderDate)) / 86400000) : null;
  const overdue = isOverdue(order.deadline, order.deliveryStatus);

  function field(label, value) {
    return '<div class="space-y-1"><dt class="text-[11px] uppercase tracking-wide font-medium" style="color: var(--sub);">' + label + '</dt><dd class="text-sm font-medium" style="color: var(--text);">' + (value == null || value === '' ? '<span style="color:var(--muted);">\u2014</span>' : value) + '</dd></div>';
  }
  // Colored field for the Quantity & Pricing section — each metric gets a distinct
  // semantic color so they're easy to spot at a glance in the order detail modal.
  // Quantity = cyan, Unit Price = amber, Cliche = violet, Total Value = primary blue.
  function coloredField(label, value, color, icon) {
    const valHtml = (value == null || value === '') ? '<span style="color:var(--muted);">\u2014</span>' : value;
    return '<div class="space-y-1"><dt class="text-[11px] uppercase tracking-wide font-medium flex items-center gap-1.5" style="color: ' + color + ';">' + (icon ? '<i data-lucide="' + icon + '" class="w-3 h-3"></i>' : '') + label + '</dt><dd class="text-sm font-bold" style="color: ' + color + ';">' + valHtml + '</dd></div>';
  }

  return `
    <div class="modal-backdrop" role="dialog" aria-modal="true" onclick="if(event.target===this)closeOrderDetail()">
      <div class="modal-content max-w-3xl max-h-[90vh] overflow-y-auto scroll-thin">
        <div class="p-6 border-b" style="border-color: var(--border);">
          <div class="flex items-center gap-3 mb-1">
            <span class="font-mono text-xl font-bold" style="color: var(--primary);">${esc(order.orderId)}</span>
            ${statusChip(order.productionStatus)}
          </div>
          <p class="text-sm" style="color: var(--sub);">${esc(order.customerName) || 'Unknown customer'} · ${esc(order.description) || '\u2014'}</p>
        </div>
        <div class="p-6 space-y-5">
          ${overdue ? '<div class="flex items-center gap-2 p-3 rounded-lg" style="background: var(--danger-soft); border: 1px solid rgba(239,68,68,0.25);"><i data-lucide="alert-triangle" class="w-4 h-4 shrink-0" style="color: var(--danger);"></i><p class="text-sm" style="color: var(--danger);">This order is past its deadline and not yet delivered.</p></div>' : ''}

          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="rounded-lg border p-3" style="border-color: var(--border); background: var(--hover);"><p class="text-[10px] uppercase mb-1.5" style="color: var(--sub);">Production</p>${statusChip(order.productionStatus)}</div>
            <div class="rounded-lg border p-3" style="border-color: var(--border); background: var(--hover);"><p class="text-[10px] uppercase mb-1.5" style="color: var(--sub);">Invoice</p>${statusChip(order.invoiceStatus)}</div>
            <div class="rounded-lg border p-3" style="border-color: var(--border); background: var(--hover);"><p class="text-[10px] uppercase mb-1.5" style="color: var(--sub);">Delivery</p>${statusChip(order.deliveryStatus)}</div>
            <div class="rounded-lg border p-3" style="border-color: var(--border); background: var(--hover);"><p class="text-[10px] uppercase mb-1.5" style="color: var(--sub);">Payment</p>${statusChip(order.paymentSummary)}</div>
          </div>

          <hr style="border-color: var(--border);">

          <dl class="grid grid-cols-2 md:grid-cols-3 gap-4">
            ${field('Order ID', '<span class="font-mono">' + esc(order.orderId) + '</span>')}
            ${field('Order Date', formatDate(order.orderDate))}
            ${field('Deadline', formatDate(order.deadline))}
            ${field('Lead Time', leadTime != null ? leadTime + ' days' : null)}
            ${field('Order Type', order.orderType ? statusChip(order.orderType) : null)}

// ============================================================
// NUMERIC HELPERS (preserved)
// ============================================================
function sanitizeDecimal(value) {
  let cleaned = value.replace(/[^0-9.]/g, '');
  const parts = cleaned.split('.');
  if (parts.length > 2) cleaned = parts[0] + '.' + parts.slice(1).join('');
  return cleaned;
}
function numericKeyDown(e, currentValue) {
  if (e.metaKey || e.ctrlKey) return true;
  if (/^\d$/.test(e.key)) return true;
  if (e.key === '.' && !currentValue.includes('.')) return true;
  if (['Backspace', 'Delete', 'Tab', 'Escape', 'Enter', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End'].includes(e.key)) return true;
  e.preventDefault();
  return false;
}
function recalcTotalValue() {
  const formEl = document.getElementById('order-form');
  if (!formEl) return;
  const qtyInput = formEl.querySelector('[name="quantity"]');
  const priceInput = formEl.querySelector('[name="unitPrice"]');
  const clicheInput = formEl.querySelector('[name="clicheValue"]');
  const totalInput = formEl.querySelector('[name="totalValue"]');
  if (!qtyInput || !priceInput || !totalInput) return;
  const qty = parseFloat(qtyInput.value) || 0;
  const price = parseFloat(priceInput.value) || 0;
  const cliche = clicheInput ? (parseFloat(clicheInput.value) || 0) : 0;
  if (qtyInput.value !== '' && priceInput.value !== '') {
    totalInput.value = (qty * price + cliche).toFixed(2);
  }
}

function saveForm() {
  const formEl = document.getElementById('order-form');
  const fd = new FormData(formEl);
  const data = {};
  for (const [key, value] of fd.entries()) { data[key] = value.trim(); }

  if (!data.orderId) { toast('Please fix the errors', 'Order ID is required', 'destructive'); return; }
  if (!data.customerName) { toast('Please fix the errors', 'Customer name is required', 'destructive'); return; }

  if (state.formMode === 'create') {
    if (state.orders.find(o => o.orderId === data.orderId)) {
      toast('Failed to create order', 'Order ID "' + data.orderId + '" already exists', 'destructive');
      return;
    }
  }

  ['quantity', 'unitPrice', 'clicheValue', 'totalValue', 'remainingQty'].forEach(k => {
    data[k] = data[k] === '' ? null : Number(data[k]);
  });
  ['orderDate', 'deadline'].forEach(k => { data[k] = data[k] || null; });

  if (data.totalValue == null && data.quantity != null && data.unitPrice != null) {
    data.totalValue = data.quantity * data.unitPrice + (data.clicheValue || 0);
  }

  if (state.formMode === 'create') {
    createOrder(data);
    toast('Order created', data.orderId + ' has been added.');
  } else {
    if (data.orderId !== state.formOrderId) {
      if (state.orders.find(o => o.orderId === data.orderId)) {
        toast('Failed to update order', 'Order ID "' + data.orderId + '" already exists', 'destructive');
        return;
      }
    }
    updateOrder(state.formOrderId, data);
    toast('Order updated', data.orderId + ' has been saved.');
  }
  closeForm();
}

function confirmDeleteOrder(orderId) {
  const container = document.createElement('div');
  container.className = 'modal-backdrop';
  container.setAttribute('role', 'dialog');
  container.setAttribute('aria-modal', 'true');
  container.style.zIndex = '110';
  container.innerHTML = `
    <div class="modal-content max-w-md w-full p-6">
      <div class="flex items-center gap-3 mb-3">
        <div class="kpi-icon icon-danger shrink-0"><i data-lucide="alert-triangle" class="w-5 h-5"></i></div>

        <span class="font-mono font-semibold" style="color: var(--text);">${esc(orderId)}</span>.
        This action cannot be undone.
      </p>
      <div class="flex gap-2 justify-end">
        <button id="delete-cancel" class="btn btn-ghost">Cancel</button>
        <button id="delete-confirm" class="btn btn-danger"><i data-lucide="trash-2" class="w-4 h-4"></i> Delete Order</button>
      </div>
    </div>
  `;

// COMMAND PALETTE (Ctrl+K) — wired to real actions
// ============================================================
function openCmdPalette() {
