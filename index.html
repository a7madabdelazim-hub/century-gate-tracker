function renderCmdResults(query) {
  const container = document.getElementById('cmd-results');
  const q = (query || '').toLowerCase().trim();
  let html = '';
  let actions = [];

  // Quick actions
  actions.push({ icon: 'plus', label: 'Create new order', desc: 'Open the order form', action: () => { closeCmdPalette(); openCreateForm(); } });
  actions.push({ icon: 'file-text', label: 'Export orders to PDF', desc: 'Download filtered orders as PDF', action: () => { closeCmdPalette(); exportPDF(); } });
  actions.push({ icon: 'filter', label: 'Toggle filters', desc: 'Show/hide the filter panel', action: () => { closeCmdPalette(); if (state.view !== 'orders') setView('orders'); else toggleFilters(); } });
  actions.push({ icon: state.theme === 'dark' ? 'sun' : 'moon', label: 'Toggle ' + (state.theme === 'dark' ? 'light' : 'dark') + ' mode', desc: 'Switch theme', action: () => { closeCmdPalette(); toggleTheme(); } });
  actions.push({ icon: 'layout-dashboard', label: 'Go to Dashboard', desc: 'Switch to dashboard view', action: () => { closeCmdPalette(); setView('dashboard'); } });
  actions.push({ icon: 'clipboard-list', label: 'Go to Orders', desc: 'Switch to orders view', action: () => { closeCmdPalette(); setView('orders'); } });

  let filteredActions = q ? actions.filter(a => a.label.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q)) : actions;
  let orderResults = [];
  if (q) {
    orderResults = state.orders.filter(o =>
      (o.orderId || '').toLowerCase().includes(q) ||
      (o.customerName || '').toLowerCase().includes(q) ||
      (o.description || '').toLowerCase().includes(q)
    ).slice(0, 8);
  } else {
    orderResults = [...state.orders].sort((a, b) => new Date(b.orderDate || 0) - new Date(a.orderDate || 0)).slice(0, 5);
  }

  state.cmdSelectedIndex = 0;
  let allItems = [];

  if (filteredActions.length > 0) {
    html += '<p class="px-5 py-1 text-[10px] uppercase tracking-wider font-semibold" style="color: var(--muted);">Quick actions</p>';
    filteredActions.forEach((a, i) => {
      allItems.push({ type: 'action', data: a });
      html += `<div class="cmd-result ${i === 0 && !q ? 'selected' : ''}" data-idx="${allItems.length - 1}"><div class="kpi-icon icon-primary shrink-0" style="width:32px;height:32px;"><i data-lucide="${a.icon}" class="w-4 h-4"></i></div><div class="flex-1"><div class="text-sm font-semibold" style="color: var(--text);">${a.label}</div><div class="text-xs" style="color: var(--sub);">${a.desc}</div></div></div>`;
    });
  }

  if (orderResults.length > 0) {
    html += '<p class="px-5 py-1 mt-2 text-[10px] uppercase tracking-wider font-semibold" style="color: var(--muted);">Orders</p>';
    orderResults.forEach((o) => {
      allItems.push({ type: 'order', data: o });
      html += `<div class="cmd-result" data-idx="${allItems.length - 1}"><div class="kpi-icon icon-accent shrink-0" style="width:32px;height:32px;"><i data-lucide="clipboard-list" class="w-4 h-4"></i></div><div class="flex-1"><div class="text-sm font-semibold" style="color: var(--text);">${esc(o.orderId)} \u00b7 ${esc(o.customerName)}</div><div class="text-xs" style="color: var(--sub);">${esc(o.description || 'No description')} \u00b7 ${formatSARShort(o.totalValue)}</div></div></div>`;
    });
  }

  if (allItems.length === 0) {
    html = '<div class="px-5 py-8 text-center text-sm" style="color: var(--sub);">No results found for "' + esc(query) + '"</div>';
  }

  container.innerHTML = html;
  container._allItems = allItems;

  // Attach click handlers
  container.querySelectorAll('.cmd-result').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      const item = allItems[idx];
      if (item) { if (item.data.action) item.data.action(); else { closeCmdPalette(); openOrderDetail(item.data.orderId); } }
    });
    el.addEventListener('mouseenter', () => {
      container.querySelectorAll('.cmd-result').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      state.cmdSelectedIndex = parseInt(el.dataset.idx);
    });
  });

  if (window.lucide) lucide.createIcons();
}

// ============================================================
// PDF EXPORT (preserved, only colors updated)
// ============================================================
function exportPDF() {
  if (state.isExportingPdf) return;
  state.isExportingPdf = true;
  const btn = document.getElementById('pdf-btn');
  if (btn) btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4" style="animation: spin 1s linear infinite;"></i> Generating...';
  if (window.lucide) lucide.createIcons();

  try {
    const filtered = getFilteredOrders();
    if (filtered.length === 0) {
      toast('No orders to export', 'No orders match your current filters.', 'destructive');
      state.isExportingPdf = false;
      if (btn) btn.innerHTML = '<i data-lucide="file-text" class="w-4 h-4"></i> <span>Export PDF</span>';
      if (window.lucide) lucide.createIcons();
      return;
    }

    const groups = {};
    for (const o of filtered) {
      const k = o.productType || 'Uncategorized';
      if (!groups[k]) groups[k] = [];
      groups[k].push(o);
    }
    const groupArray = Object.entries(groups).map(([productType, orders]) => ({
      productType, orders,
      totalValue: orders.reduce((s, o) => s + (o.totalValue || 0), 0),
      orderCount: orders.length,
    })).sort((a, b) => b.totalValue - a.totalValue);

    const totalValue = filtered.reduce((s, o) => s + (o.totalValue || 0), 0);
    const totalCliche = filtered.reduce((s, o) => s + (o.clicheValue || 0), 0);

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const pageWidth = doc.internal.pageSize.getWidth();
    const pageHeight = doc.internal.pageSize.getHeight();
    const margin = 14;
    const contentWidth = pageWidth - margin * 2;

    const PRIMARY = [37, 99, 235];
    const PRIMARY_DARK = [7, 11, 23];
    const ACCENT = [6, 182, 212];
    const TEXT = [15, 23, 42];
    const MUTED = [71, 85, 105];
    const BORDER = [229, 231, 235];
    const LIGHT_BG = [243, 244, 246];
    const WHITE = [255, 255, 255];

    // Header
    doc.setFillColor(...PRIMARY_DARK);
    doc.rect(0, 0, pageWidth, 24, 'F');
    doc.setFillColor(...PRIMARY);
    doc.roundedRect(margin, 4, 16, 16, 2, 2, 'F');
    doc.setTextColor(...WHITE);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.text('CG', margin + 8, 14.5, { align: 'center' });
    doc.setFontSize(15);
    doc.text('Century Gate Company Ltd', margin + 20, 12);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.text('Order Tracker \u2014 Filtered Orders Export', margin + 20, 18);
    const now = new Date();
    const ts = now.toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    doc.setFontSize(8);
    doc.text('Generated ' + ts, pageWidth - margin, 12, { align: 'right' });
    doc.text(filtered.length + ' orders \u00b7 ' + groupArray.length + ' categories', pageWidth - margin, 18, { align: 'right' });

    let cursorY = 30;

    const kpiWidth = (contentWidth - 6) / 4;
    const kpis = [
      { label: 'TOTAL ORDERS', value: String(filtered.length), accent: PRIMARY },
      { label: 'TOTAL VALUE', value: 'SAR ' + totalValue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }), accent: ACCENT },
      { label: 'TOTAL CLICHE', value: 'SAR ' + totalCliche.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }), accent: PRIMARY },
      { label: 'CATEGORIES', value: String(groupArray.length), accent: ACCENT },
    ];
    kpis.forEach((kpi, i) => {
      const x = margin + i * (kpiWidth + 2);
      doc.setFillColor(...LIGHT_BG);
      doc.roundedRect(x, cursorY, kpiWidth, 16, 2, 2, 'F');
      doc.setTextColor(...MUTED);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7);
      doc.text(kpi.label, x + 3, cursorY + 5);
      doc.setTextColor(...kpi.accent);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.text(kpi.value, x + 3, cursorY + 12);
    });
    cursorY += 22;

    const activeFilters = [];
    if (state.search) activeFilters.push('Search: ' + state.search);
    if (state.filterProduction) activeFilters.push('Production: ' + state.filterProduction);
    if (state.filterInvoice) activeFilters.push('Invoice: ' + state.filterInvoice);

    if (activeFilters.length > 0) {
      doc.setTextColor(...MUTED);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(7);
      doc.text('ACTIVE FILTERS', margin, cursorY + 1);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(...TEXT);
      const filterText = activeFilters.join('    \u00b7    ');
      const wrapped = doc.splitTextToSize(filterText, contentWidth);
      doc.text(wrapped, margin, cursorY + 5);
      cursorY += 5 + wrapped.length * 4 + 4;
    } else {
      doc.setTextColor(...MUTED);
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(8);
      doc.text('No filters applied \u2014 showing all orders.', margin, cursorY + 4);
      cursorY += 12;
    }

    groupArray.forEach((group) => {
      if (cursorY + 30 > pageHeight - margin) { doc.addPage(); cursorY = margin; }

      doc.setFillColor(...PRIMARY);
      doc.rect(margin, cursorY, contentWidth, 12, 'F');
      doc.setTextColor(...WHITE);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(12);
      doc.text(group.productType, margin + 4, cursorY + 8);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.text(group.orderCount + ' orders   \u00b7   SAR ' + group.totalValue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }), pageWidth - margin - 4, cursorY + 8, { align: 'right' });
      cursorY += 14;

      const rows = group.orders.map(o => [
        o.customerNumber || '\u2014', formatDate(o.orderDate), o.customerName || '\u2014', o.description || '\u2014',
        formatNumber(o.quantity) + (o.qtyUnit ? ' ' + o.qtyUnit : ''),
        o.unitPrice != null ? o.unitPrice.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '\u2014',
        o.clicheValue != null ? o.clicheValue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '\u2014',
        o.totalValue != null ? o.totalValue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '\u2014',
        formatDate(o.deadline), o.productionStatus || '\u2014',
      ]);

      doc.autoTable({
        startY: cursorY,
        head: [['Cust No', 'Order Date', 'Customer', 'Description', 'Quantity', 'Unit Price', 'Cliche', 'Total Value', 'Deadline', 'Production']],
        body: rows,
        theme: 'striped',
        headStyles: { fillColor: PRIMARY_DARK, textColor: WHITE, fontSize: 9, fontStyle: 'bold', halign: 'left', cellPadding: 2 },
        bodyStyles: { fontSize: 9, textColor: TEXT, cellPadding: 2, lineColor: BORDER, lineWidth: 0.1 },
        alternateRowStyles: { fillColor: LIGHT_BG },
        columnStyles: {
          0: { fontStyle: 'bold', textColor: PRIMARY },
          5: { halign: 'right' },
          6: { halign: 'right' },
          7: { halign: 'right', fontStyle: 'bold' },
        },
        tableWidth: 'auto',
        margin: { left: margin, right: margin, bottom: 14 },
        didDrawPage: function() {
          const pageNum = doc.internal.getNumberOfPages();
          doc.setFontSize(7);
          doc.setTextColor(...MUTED);
          doc.setFont('helvetica', 'normal');
          doc.text('Page ' + pageNum + '   \u00b7   Century Gate Order Tracker   \u00b7   ' + ts, pageWidth / 2, pageHeight - 6, { align: 'center' });
        },
      });

      cursorY = doc.lastAutoTable.finalY + 10;
    });

    if (cursorY + 30 > pageHeight - margin) { doc.addPage(); cursorY = margin; } else { cursorY += 4; }
    doc.setFillColor(...LIGHT_BG);
    doc.roundedRect(margin, cursorY, contentWidth, 22, 2, 2, 'F');
    doc.setTextColor(...PRIMARY_DARK);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.text('Export Summary', margin + 4, cursorY + 6);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(...TEXT);
    const summaryLines = [
      'Total orders exported: ' + filtered.length,
      'Total value across all categories: SAR ' + totalValue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }),
      'Total cliche value: SAR ' + totalCliche.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }),
      'Number of product categories: ' + groupArray.length,
    ];
    summaryLines.forEach((line, i) => { doc.text(line, margin + 4, cursorY + 11 + i * 3); });

    const filename = 'century-gate-orders-' + now.toISOString().slice(0, 10) + '.pdf';
    doc.save(filename);

    toast('PDF exported', filtered.length + ' orders across ' + groupArray.length + ' categor' + (groupArray.length === 1 ? 'y' : 'ies') + ' exported.');
  } catch (e) {
    toast('PDF export failed', e.message || 'An unexpected error occurred.', 'destructive');
  } finally {
    state.isExportingPdf = false;
    if (btn) btn.innerHTML = '<i data-lucide="file-text" class="w-4 h-4"></i> <span>Export PDF</span>';
    if (window.lucide) lucide.createIcons();
  }
}

// ============================================================
// EVENT LISTENERS
// ============================================================
function attachEventListeners() {
  const searchInput = document.getElementById('search-input');
  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      state.search = e.target.value;
      state.page = 1;
      clearTimeout(window._searchTimer);
      window._searchTimer = setTimeout(() => { render(); }, 300);
    }, { passive: true });
  }

  if (document.getElementById('order-form')) {
    recalcTotalValue();
  }

  // Close notif on outside click
  document.addEventListener('click', (e) => {
    const panel = document.getElementById('notif-panel');
    if (panel && panel.style.display === 'block' && !panel.contains(e.target) && !e.target.closest('[onclick*="toggleNotifs"]')) {
      panel.style.display = 'none';
    }
  });
}

// ============================================================
// GLOBAL KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  // Cmd/Ctrl + K — command palette
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    const open = document.getElementById('cmd-backdrop').style.display === 'flex';
    open ? closeCmdPalette() : openCmdPalette();
  }
  // Escape — close any open overlay
  if (e.key === 'Escape') {
    closeCmdPalette();
    const notifPanel = document.getElementById('notif-panel');
    if (notifPanel) notifPanel.style.display = 'none';
  }
  // Arrow up/down + Enter in command palette
  const cmdOpen = document.getElementById('cmd-backdrop').style.display === 'flex';
  if (cmdOpen) {
    const container = document.getElementById('cmd-results');
    const items = container._allItems || [];
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      state.cmdSelectedIndex = Math.min(state.cmdSelectedIndex + 1, items.length - 1);
      updateCmdSelection();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      state.cmdSelectedIndex = Math.max(state.cmdSelectedIndex - 1, 0);
      updateCmdSelection();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      const item = items[state.cmdSelectedIndex];
      if (item) {
        if (item.data.action) item.data.action();
        else { closeCmdPalette(); openOrderDetail(item.data.orderId); }
      }
    }
  }
});

function updateCmdSelection() {
  const container = document.getElementById('cmd-results');
  container.querySelectorAll('.cmd-result').forEach((el, i) => {
    el.classList.toggle('selected', parseInt(el.dataset.idx) === state.cmdSelectedIndex);
  });
  // Scroll selected into view
  const sel = container.querySelector('.cmd-result.selected');
  if (sel) sel.scrollIntoView({ block: 'nearest' });
}

// Cmd input listener
document.addEventListener('DOMContentLoaded', () => {
  const cmdInput = document.getElementById('cmd-input');
  if (cmdInput) {
    cmdInput.addEventListener('input', (e) => {
      renderCmdResults(e.target.value);
    });
  }
});

// ============================================================
// INIT
// ============================================================
function init() {
  loadTheme();
  loadOrders();
  render();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

// Add spin keyframe for loader
const styleEl = document.createElement('style');
styleEl.textContent = '@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }';
document.head.appendChild(styleEl);

</script>
