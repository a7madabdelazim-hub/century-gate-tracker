<title>Century Gate — Order Tracker</title>

<style>
/* ============================================================
   Design Tokens (Excel-matched + dashboard accent)
   ============================================================ */
:root {
  --xl-navy: #1F3864;
  --xl-blue: #2E75B6;
  --xl-purple: #7030A0;
  --xl-orange: #1F6B42;
  --xl-dark-teal: #1A5276;
  --xl-white: #FFFFFF;
  --xl-alt-row: #F2F2F2;
  --xl-border: #BFBFBF;
  --xl-text-dark: #000000;

  --ios-red: #FF453A;
  --ios-orange: #FF9F0A;
  --ios-green: #30D158;
  --ios-blue: #0A84FF;

  /* Dashboard dark theme */
  --dash-bg: #0A0E1A;
  --dash-card: #131826;
  --dash-card-2: #1A2033;
  --dash-border: rgba(255,255,255,0.06);
  --dash-text: #E4E7EF;
  --dash-text-dim: #6B7280;
  --dash-text-bright: #FFFFFF;
  --dash-green: #00D9A3;
  --dash-red: #FF4757;
  --dash-yellow: #FFC542;
  --dash-cyan: #00D4FF;
  --dash-purple: #A78BFA;
  --dash-pink: #FF6B9D;

  --font-xl: "Aptos", "Segoe UI", "Helvetica Neue", -apple-system, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }

html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }

body {
  font-family: var(--font-xl);
  background: #FFFFFF;
  color: var(--xl-text-dark);
  -webkit-font-smoothing: antialiased;
  font-size: 14px; line-height: 1.3;
  user-select: none; -webkit-user-select: none;
  touch-action: manipulation;
}

.app { position: fixed; inset: 0; display: flex; flex-direction: column; }

/* ============================================================
   Header
   ============================================================ */
.header {
  background: var(--xl-navy);
  color: white;
  padding: calc(env(safe-area-inset-top) + 8px) 12px 8px;
  flex-shrink: 0; z-index: 30;
}
.header-row {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.header-title {
  font-size: 17px; font-weight: 700; letter-spacing: 0.2px;
  display: flex; align-items: center; gap: 6px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.header-actions { display: flex; gap: 6px; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 8px;
  background: rgba(255,255,255,0.15); border: none; color: white;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.15s, transform 0.1s; flex-shrink: 0;
}
.icon-btn:active { background: rgba(255,255,255,0.3); transform: scale(0.94); }
.icon-btn svg { width: 18px; height: 18px; }

.search-wrap { padding: 6px 0 4px; }
.search {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.18); border-radius: 8px; padding: 7px 10px;
}
.search svg { flex-shrink: 0; color: rgba(255,255,255,0.7); }
.search input {
  flex: 1; border: none; background: transparent; color: white;
  font-size: 15px; font-family: inherit; outline: none;
}
.search input::placeholder { color: rgba(255,255,255,0.6); }

/* Multi-select chips */
.chip-row {
  display: flex; gap: 6px; padding: 6px 0 2px; overflow-x: auto; scrollbar-width: none;
}
.chip-row::-webkit-scrollbar { display: none; }
.chip {
  flex: 0 0 auto; padding: 6px 13px; border-radius: 14px;
  background: rgba(255,255,255,0.12); color: white;
  font-size: 12px; font-weight: 600; border: 1.5px solid rgba(255,255,255,0.2);
  cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 5px;
}
.chip.active { background: white; color: var(--xl-navy); border-color: white; }
.chip:active { transform: scale(0.96); }
.chip .check {
  width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid currentColor;
  display: none; align-items: center; justify-content: center;
}
.chip.active .check { display: flex; background: var(--xl-navy); border-color: var(--xl-navy); color: white; }

/* ============================================================
   Spreadsheet container
   ============================================================ */
.content { flex: 1; overflow: hidden; position: relative; }
.content.tabular { overflow: auto; -webkit-overflow-scrolling: touch; }
.content.tabular::-webkit-scrollbar { display: none; }
.content.dashboard-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 0 calc(60px + env(safe-area-inset-bottom)); background: var(--dash-bg); }
.content.dashboard-scroll::-webkit-scrollbar { display: none; }

/* Excel banner above table */
.table-banner {
  background: var(--xl-navy); color: white;
  font-size: 15px; font-weight: 700;
  padding: 10px 12px;
  letter-spacing: 0.3px;
  border-bottom: 1px solid var(--xl-border);
}

/* Table — only header is sticky, no sticky columns */
table.orders {
  border-collapse: collapse; width: max-content; min-width: 100%;
  font-family: var(--font-xl); font-size: 12px;
}
table.orders thead th {
  font-weight: 700; color: white; font-size: 11px;
  padding: 9px 6px; text-align: center;
  border: 0.5px solid var(--xl-border);
  white-space: nowrap;
  position: sticky; top: 0; z-index: 4;
  background: var(--xl-blue);
  cursor: pointer; user-select: none;
}
table.orders thead th.purple { background: var(--xl-purple); }
table.orders thead th.sortable::after {
  content: '↕'; opacity: 0.4; margin-left: 4px; font-size: 10px;
}
table.orders thead th.sort-asc::after { content: '▲'; opacity: 1; color: #FFD60A; }
table.orders thead th.sort-desc::after { content: '▼'; opacity: 1; color: #FFD60A; }

table.orders tbody td {
  padding: 7px 6px; text-align: center;
  border: 0.5px solid #E0E0E0;
  white-space: nowrap; font-size: 12px;
  background: white; color: var(--xl-text-dark);
  position: relative;
}
table.orders tbody tr:nth-child(even) td { background: var(--xl-alt-row); }
table.orders tbody td.num { text-align: right; font-variant-numeric: tabular-nums; padding-right: 10px; }
table.orders tbody td.desc { text-align: left; padding-left: 8px; }

table.orders tbody tr { cursor: pointer; transition: background 0.1s; }
table.orders tbody tr:active td { background: #E5EFFA !important; }
table.orders tbody tr.selected td { background: #FFF4D6 !important; }
table.orders tbody tr.selected:nth-child(even) td { background: #FFEFC0 !important; }

/* Left color bar for row status */
table.orders tbody td:first-child { position: relative; padding-left: 10px; }
table.orders tbody tr.row-overdue td:first-child::before,
table.orders tbody tr.row-urgent td:first-child::before,
table.orders tbody tr.row-done td:first-child::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
}
table.orders tbody tr.row-overdue td:first-child::before { background: var(--ios-red); }
table.orders tbody tr.row-urgent td:first-child::before { background: var(--ios-orange); }
table.orders tbody tr.row-done td:first-child::before { background: var(--ios-green); }

/* Status cell colors */
.st-completed { color: #1F6B42; font-weight: 700; }
.st-progress { color: #C55A11; font-weight: 700; }
.st-invoiced { color: var(--xl-blue); font-weight: 700; }
.st-not-invoiced { color: #7F7F7F; font-weight: 600; }
.st-delivered { color: var(--xl-dark-teal); font-weight: 700; }
.st-not-shipped { color: var(--ios-red); font-weight: 600; }

/* Selection mode checkbox */
.sel-cb {
  display: none; width: 18px; height: 18px;
  border: 2px solid var(--xl-blue); border-radius: 4px;
  background: white; margin: 0 auto;
  position: relative;
}
.sel-mode .sel-cb { display: block; }
.sel-mode td:first-child { padding-left: 8px; }
tr.selected .sel-cb { background: var(--xl-blue); border-color: var(--xl-blue); }
tr.selected .sel-cb::after {
  content: '✓'; color: white; font-size: 12px; font-weight: 700;
  position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
}

/* Empty state */
.empty-state { padding: 60px 24px; text-align: center; color: #7F7F7F; }
.empty-state h3 { color: var(--xl-navy); font-size: 18px; margin-bottom: 6px; }

/* ============================================================
   Bulk action bar
   ============================================================ */
.bulk-bar {
  position: fixed; left: 8px; right: 8px;
  bottom: calc(70px + env(safe-area-inset-bottom));
  background: var(--xl-navy); color: white;
  border-radius: 12px; padding: 8px 10px;
  display: none; align-items: center; gap: 6px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 35;
}
.bulk-bar.show { display: flex; }
.bulk-count { font-size: 13px; font-weight: 700; padding: 0 8px; flex: 1; }
.bulk-btn {
  border: none; background: rgba(255,255,255,0.15); color: white;
  font-family: inherit; font-size: 12px; font-weight: 600;
  padding: 7px 10px; border-radius: 8px; cursor: pointer;
  white-space: nowrap;
}
.bulk-btn:active { background: rgba(255,255,255,0.3); }
.bulk-btn.danger { background: var(--ios-red); }

/* ============================================================
   Dashboard — Modern Multinational Style
   ============================================================ */
.dash-container { padding: 12px; }

/* Hero */
.dash-hero {
  background: linear-gradient(135deg, #1A1F36 0%, #2D1B69 100%);
  border-radius: 20px; padding: 20px 18px; margin-bottom: 14px;
  position: relative; overflow: hidden;
  border: 1px solid var(--dash-border);
}
.dash-hero::before {
  content: ''; position: absolute; top: -50%; right: -20%;
  width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,255,0.25), transparent 70%);
  pointer-events: none;
}
.dash-hero-label {
  font-size: 11px; color: var(--dash-text-dim); font-weight: 600;
  text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px;
}
.dash-hero-value {
  font-size: 34px; font-weight: 800; color: var(--dash-text-bright);
  letter-spacing: -1px; font-variant-numeric: tabular-nums;
}
.dash-hero-value .unit { font-size: 16px; color: var(--dash-text-dim); font-weight: 500; margin-left: 6px; }
.dash-hero-sub {
  font-size: 12px; color: var(--dash-text); margin-top: 6px;
  display: flex; align-items: center; gap: 8px;
}
.dash-hero-trend {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px; border-radius: 999px;
  background: rgba(0,217,163,0.15); color: var(--dash-green);
  font-size: 11px; font-weight: 700;
}

/* KPI tiles row */
.kpi-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 14px;
}
.kpi-tile {
  background: var(--dash-card); border: 1px solid var(--dash-border);
  border-radius: 14px; padding: 14px;
  position: relative; overflow: hidden;
}
.kpi-tile .kpi-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.kpi-tile .kpi-ico {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.kpi-tile .kpi-ico.green { background: rgba(0,217,163,0.15); color: var(--dash-green); }
.kpi-tile .kpi-ico.red { background: rgba(255,71,87,0.15); color: var(--dash-red); }
.kpi-tile .kpi-ico.yellow { background: rgba(255,197,66,0.15); color: var(--dash-yellow); }
.kpi-tile .kpi-ico.cyan { background: rgba(0,212,255,0.15); color: var(--dash-cyan); }
.kpi-tile .kpi-ico.purple { background: rgba(167,139,250,0.15); color: var(--dash-purple); }
.kpi-tile .kpi-ico.pink { background: rgba(255,107,157,0.15); color: var(--dash-pink); }
.kpi-tile .kpi-label {
  font-size: 10px; color: var(--dash-text-dim); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.8px;
}
.kpi-tile .kpi-val {
  font-size: 24px; font-weight: 800; color: var(--dash-text-bright);
  letter-spacing: -0.5px; font-variant-numeric: tabular-nums;
}
.kpi-tile .kpi-sub {
  font-size: 11px; color: var(--dash-text-dim); margin-top: 2px;
}
.kpi-tile .spark {
  position: absolute; bottom: 0; left: 0; right: 0; height: 30px;
  opacity: 0.4;
}

/* Section card */
.dash-card {
  background: var(--dash-card); border: 1px solid var(--dash-border);
  border-radius: 14px; padding: 14px; margin-bottom: 14px;
}
.dash-card-title {
  font-size: 13px; font-weight: 700; color: var(--dash-text-bright);
  letter-spacing: -0.2px; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.dash-card-title .sub {
  font-size: 10px; font-weight: 500; color: var(--dash-text-dim);
  text-transform: uppercase; letter-spacing: 0.5px;
}

/* Funnel */
.funnel { display: flex; flex-direction: column; gap: 6px; }
.funnel-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
.funnel-label { width: 90px; color: var(--dash-text); flex-shrink: 0; font-weight: 600; }
.funnel-track { flex: 1; height: 24px; background: var(--dash-card-2); border-radius: 6px; overflow: hidden; position: relative; }
.funnel-fill {
  height: 100%; border-radius: 6px;
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 8px; color: white; font-size: 11px; font-weight: 700;
  transition: width 0.8s cubic-bezier(0.32, 0.72, 0, 1);
  white-space: nowrap;
}
.funnel-val { width: 38px; text-align: right; color: var(--dash-text-bright); font-weight: 700; flex-shrink: 0; font-variant-numeric: tabular-nums; }

/* Donut row */
.donut-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.donut-cell { text-align: center; }
.donut-cell svg { width: 80px; height: 80px; }
.donut-cell .lbl { font-size: 10px; color: var(--dash-text-dim); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.donut-cell .pct { font-size: 16px; font-weight: 800; color: var(--dash-text-bright); margin-top: 2px; }
.donut-legend { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
.donut-legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--dash-text); }
.donut-legend-dot { width: 8px; height: 8px; border-radius: 2px; }
.donut-legend-val { margin-left: auto; font-weight: 700; color: var(--dash-text-bright); font-variant-numeric: tabular-nums; }

/* Leaderboard */
.leader-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--dash-border);
}
.leader-row:last-child { border-bottom: none; }
.leader-rank {
  width: 26px; height: 26px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; flex-shrink: 0;
  background: var(--dash-card-2); color: var(--dash-text-dim);
}
.leader-rank.r1 { background: linear-gradient(135deg, #FFD60A, #FF9F0A); color: #4a2c00; }
.leader-rank.r2 { background: linear-gradient(135deg, #E5E5EA, #AEAEB2); color: #1c1c1e; }
.leader-rank.r3 { background: linear-gradient(135deg, #C7905A, #8B5A2B); color: white; }
.leader-info { flex: 1; min-width: 0; }
.leader-name { font-size: 13px; font-weight: 700; color: var(--dash-text-bright); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.leader-meta { font-size: 11px; color: var(--dash-text-dim); margin-top: 1px; }
.leader-val { font-size: 13px; font-weight: 800; color: var(--dash-green); font-variant-numeric: tabular-nums; text-align: right; flex-shrink: 0; }
.leader-val .unit { font-size: 10px; color: var(--dash-text-dim); }

/* Bar chart */
.bar-list { display: flex; flex-direction: column; gap: 10px; }
.bar-item { display: flex; flex-direction: column; gap: 4px; }
.bar-item-head { display: flex; justify-content: space-between; font-size: 11px; }
.bar-item-name { color: var(--dash-text); font-weight: 600; }
.bar-item-val { color: var(--dash-text-bright); font-weight: 700; font-variant-numeric: tabular-nums; }
.bar-item-track { height: 8px; background: var(--dash-card-2); border-radius: 4px; overflow: hidden; }
.bar-item-fill { height: 100%; border-radius: 4px; transition: width 0.8s cubic-bezier(0.32, 0.72, 0, 1); }

/* Line chart (SVG) */
.line-chart-svg { width: 100%; height: 120px; display: block; }

/* Alerts panel */
.alert-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px; margin-bottom: 6px;
  font-size: 12px;
}
.alert-item.red { background: rgba(255,71,87,0.1); border-left: 3px solid var(--dash-red); }
.alert-item.yellow { background: rgba(255,197,66,0.1); border-left: 3px solid var(--dash-yellow); }
.alert-ico { font-size: 16px; flex-shrink: 0; }
.alert-text { flex: 1; color: var(--dash-text); }
.alert-text strong { color: var(--dash-text-bright); }
.alert-val { font-weight: 800; color: var(--dash-text-bright); font-variant-numeric: tabular-nums; }

/* ============================================================
   Bottom Tab Bar
   ============================================================ */
.tabbar {
  height: calc(54px + env(safe-area-inset-bottom));
  padding-bottom: env(safe-area-inset-bottom);
  background: var(--xl-navy);
  display: flex; flex-shrink: 0; z-index: 40;
}
.tab {
  flex: 1; border: none; background: transparent;
  color: rgba(255,255,255,0.6); font-family: inherit;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; cursor: pointer; padding: 6px 0;
  font-size: 10px; font-weight: 600; transition: color 0.15s;
}
.tab.active { color: white; background: rgba(255,255,255,0.1); }
.tab svg { width: 22px; height: 22px; }
.tab:active { background: rgba(255,255,255,0.15); }

/* ============================================================
   Bottom Sheet
   ============================================================ */
.sheet-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 50;
}
.sheet-backdrop.show { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: #F2F2F7;
  border-radius: 16px 16px 0 0;
  padding: 8px 0 calc(16px + env(safe-area-inset-bottom));
  z-index: 60;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 90vh;
  display: flex; flex-direction: column;
}
.sheet.show { transform: translateY(0); }
.sheet-grabber { width: 36px; height: 4px; background: #BFBFBF; border-radius: 2px; margin: 0 auto 8px; }
.sheet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px 10px; border-bottom: 1px solid var(--xl-border);
  background: white; margin: -8px 0 0;
}
.sheet-title { font-size: 16px; font-weight: 700; color: var(--xl-navy); }
.sheet-btn {
  border: none; background: transparent; color: var(--xl-blue);
  font-size: 16px; font-family: inherit; cursor: pointer; padding: 4px 10px;
  font-weight: 600; min-width: 60px;
}
.sheet-btn.destructive { color: var(--ios-red); }
.sheet-btn:active { opacity: 0.5; }
.sheet-body {
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 14px 16px 20px;
}

/* Form fields */
.form-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px 12px;
}
.form-field { display: flex; flex-direction: column; gap: 4px; }
.form-field.full { grid-column: 1 / -1; }
.form-label {
  font-size: 11px; font-weight: 700; color: white;
  padding: 4px 8px; border-radius: 4px 4px 0 0;
  background: var(--xl-blue);
  display: inline-block; letter-spacing: 0.2px;
}
.form-field.purple .form-label { background: var(--xl-purple); }
.form-field.navy .form-label { background: var(--xl-navy); }
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: white; border: 1px solid var(--xl-border);
  border-radius: 0 4px 4px 4px;
  padding: 10px 10px; font-size: 15px;
  color: var(--xl-text-dark); font-family: inherit; outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none; appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--xl-blue); }
.form-textarea { min-height: 60px; resize: none; }
.form-read { background: #F2F2F2; color: #7F7F7F; font-weight: 600; }

.form-section-divider {
  grid-column: 1 / -1; height: 1px; background: var(--xl-border);
  margin: 6px 0;
}

.form-summary {
  background: white; border: 1px solid var(--xl-border);
  border-radius: 4px; padding: 10px; margin-top: 10px;
  font-size: 13px;
}
.form-summary-row { display: flex; justify-content: space-between; padding: 4px 0; }
.form-summary-row.total {
  border-top: 1px solid var(--xl-border); margin-top: 4px; padding-top: 8px;
  font-weight: 700; font-size: 15px; color: var(--xl-navy);
}
.form-summary-row .k { color: #7F7F7F; }
.form-summary-row .v { font-weight: 700; font-variant-numeric: tabular-nums; }

/* Photo attachment */
.photo-section {
  background: white; border: 1px solid var(--xl-border);
  border-radius: 4px; padding: 10px; margin-top: 10px;
}
.photo-section .k {
  font-size: 11px; font-weight: 700; color: var(--xl-navy);
  text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 8px;
}
.photo-input-wrap { display: flex; gap: 8px; align-items: center; }
.photo-preview {
  width: 64px; height: 64px; border-radius: 6px;
  background: #F2F2F2; border: 1px solid var(--xl-border);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
  flex-shrink: 0;
}
.photo-preview img { width: 100%; height: 100%; object-fit: cover; }
.photo-preview .placeholder { font-size: 24px; opacity: 0.3; }
.photo-btn {
  border: 1px dashed var(--xl-blue); background: #E8F4FC;
  color: var(--xl-blue); font-family: inherit; font-size: 12px; font-weight: 600;
  padding: 8px 12px; border-radius: 6px; cursor: pointer;
}
.photo-btn.remove { background: #FEE; border-color: var(--ios-red); color: var(--ios-red); }
.photo-btn:active { opacity: 0.6; }

/* Toast with action */
.toast {
  position: fixed; left: 50%; bottom: calc(80px + env(safe-area-inset-bottom));
  transform: translateX(-50%) translateY(20px);
  background: var(--xl-navy); color: white;
  padding: 10px 16px; border-radius: 999px;
  font-size: 13px; font-weight: 600; z-index: 100;
  opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  max-width: 90vw; text-align: center;
  display: flex; align-items: center; gap: 10px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
.toast-action {
  background: var(--xl-blue); color: white; border: none;
  padding: 4px 10px; border-radius: 999px;
  font-size: 12px; font-weight: 700; font-family: inherit;
  cursor: pointer; text-transform: uppercase; letter-spacing: 0.3px;
}
.toast-action:active { background: #1F5A99; }

/* Splash */
.splash {
  position: fixed; inset: 0; background: var(--xl-navy); z-index: 999;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; transition: opacity 0.4s 0.2s;
}
.splash.hide { opacity: 0; pointer-events: none; }
.splash-logo {
  width: 80px; height: 80px; border-radius: 20px;
  background: white; display: flex; align-items: center; justify-content: center;
  font-size: 48px; animation: splashPulse 1.4s ease-in-out infinite;
}
@keyframes splashPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
.splash-title { color: white; font-size: 18px; font-weight: 700; letter-spacing: 0.4px; }
.splash-sub { color: rgba(255,255,255,0.6); font-size: 12px; }

/* ============================================================
   Print / PDF styles
   ============================================================ */
.print-only { display: none; }

@media print {
  body { background: white !important; }
  .app, .splash, .sheet, .sheet-backdrop, .toast, .tabbar, .header, .table-banner { display: none !important; }
  .print-only { display: block; }
  @page { margin: 1.5cm 1cm; size: A4 landscape; }
  .print-doc { color: #000; font-family: "Aptos", "Segoe UI", Arial, sans-serif; font-size: 10pt; }
  .print-cover {
    text-align: center; padding: 30px 0 20px; border-bottom: 3px solid #1F3864;
    margin-bottom: 24px;
  }
  .print-cover h1 { color: #1F3864; font-size: 24pt; margin-bottom: 4pt; letter-spacing: 1px; }
  .print-cover .print-sub { color: #555; font-size: 11pt; }
  .print-meta {
    display: flex; justify-content: space-between; font-size: 9pt; color: #555;
    margin-bottom: 18px; padding: 0 4px;
  }
  .print-summary {
    border: 1px solid #BFBFBF; border-collapse: collapse; width: 100%;
    margin-bottom: 24px; font-size: 10pt;
  }
  .print-summary th { background: #1F3864; color: white; padding: 6pt 8pt; text-align: left; font-size: 9pt; }
  .print-summary td { border: 0.5pt solid #BFBFBF; padding: 5pt 8pt; }
  .print-summary tr:nth-child(even) td { background: #F2F2F2; }
  .print-section { page-break-before: always; }
  .print-section:first-of-type { page-break-before: avoid; }
  .print-section-title {
    background: #2E75B6; color: white;
    padding: 8pt 12pt; font-size: 13pt; font-weight: 700;
    margin-bottom: 8pt; border-radius: 4pt 4pt 0 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .print-section-title .count {
    background: rgba(255,255,255,0.25); padding: 2pt 8pt;
    border-radius: 999pt; font-size: 9pt; font-weight: 600;
  }
  .print-table {
    border-collapse: collapse; width: 100%; font-size: 8.5pt; margin-bottom: 16pt;
  }
  .print-table th {
    background: #2E75B6; color: white;
    padding: 5pt 4pt; font-size: 8pt; text-align: center;
    border: 0.5pt solid #BFBFBF; white-space: nowrap;
  }
  .print-table th.purple { background: #7030A0; }
  .print-table td {
    padding: 4pt 4pt; font-size: 8.5pt; text-align: center;
    border: 0.5pt solid #BFBFBF; white-space: nowrap;
  }
  .print-table tr:nth-child(even) td { background: #F2F2F2; }
  .print-table td.num { text-align: right; padding-right: 8pt; font-variant-numeric: tabular-nums; }
  .print-table td.left { text-align: left; padding-left: 6pt; }
  .print-footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    text-align: center; font-size: 8pt; color: #777;
    padding: 6pt 0; border-top: 0.5pt solid #BFBFBF;

  .print-page-num:after { content: counter(page); }

  .print-st.not-shipped { color: #FF453A; }
}

@media (prefers-reduced-motion: reduce) {

function load() {
  try {
    const stored = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (stored && Array.isArray(stored) && stored.length) { orders = stored; return; }
  } catch {}
  orders = SEED_ORDERS.map(o => ({...o}));
  save();
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(orders)); } catch (e) { console.warn('save failed', e); }
}

/* ============================================================
   Helpers
   ============================================================ */
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function fmtNum(n, dec=2) {
  if (n == null || n === '' || isNaN(n)) return '';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}
function fmtInt(n) {
  if (n == null || n === '' || isNaN(n)) return '';
  return Number(n).toLocaleString('en-US');
}
function fmtDate(s) {
  if (!s) return '';
  try {
    const d = new Date(s);
    if (isNaN(d)) return s;
    const day = String(d.getDate()).padStart(2, '0');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${day}-${months[d.getMonth()]}-${d.getFullYear()}`;
  } catch { return s; }
}
function daysUntil(s) {
  if (!s) return null;
  try {
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(s); d.setHours(0,0,0,0);
    return Math.round((d - today) / 86400000);
  } catch { return null; }
}
function computeTotalValue(o) {
  let total = 0;
  if (isFinite(+o.qty) && isFinite(+o.unitPrice)) total += (+o.qty) * (+o.unitPrice);
  if (isFinite(+o.cliche)) total += (+o.cliche);
  return total;
}
function computePaySummary(o) {
  if (!o.custName) return '';
  const adv = o.advance50, full = o.fullPay;
  if (adv === 'Yes') {
    if (full === 'Yes') return '✅ Fully Paid';
    if (full === 'Partial') return '💛 Partial Final';
    return '🔵 50% Advance Paid';
  }
  if (adv === 'Partial') return '🟡 Partial Advance';
  if (adv === 'No') return '❌ No Payment';
  return '';
}
function statusClass(v) {
  switch (v) {
    case 'Completed': return 'st-completed';
    case 'In Progress': return 'st-progress';
    case 'Invoiced': return 'st-invoiced';
    case 'Not Invoiced': return 'st-not-invoiced';
    case 'Fully Delivered': return 'st-delivered';
    case 'Not Shipped': return 'st-not-shipped';
    default: return '';
  }
}
function rowStatusClass(o) {
  if (o.prodStatus === 'Completed') return 'row-done';
  const d = daysUntil(o.deadline);
  if (d !== null && d < 0) return 'row-overdue';
  if (d !== null && d >= 0 && d <= 7) return 'row-urgent';
  return '';
}

/* ============================================================
   Filter (multi-select OR)
   ============================================================ */
function getFilteredOrders() {
  let list = orders.slice();

  if (activeFilters.size > 0) {
    list = list.filter(o => {
      for (const f of activeFilters) {
        if (f === 'in-progress' && o.prodStatus === 'In Progress') return true;
        if (f === 'completed'   && o.prodStatus === 'Completed') return true;
        if (f === 'invoiced'    && o.invStatus === 'Invoiced') return true;
        if (f === 'not-invoiced'&& o.invStatus === 'Not Invoiced') return true;
      }
      return false;
    });
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(o =>
      (o.id||'').toLowerCase().includes(q) ||
      (o.custName||'').toLowerCase().includes(q) ||
      (o.custNo||'').toLowerCase().includes(q) ||
      (o.desc||'').toLowerCase().includes(q) ||
      (o.productType||'').toLowerCase().includes(q) ||
      (o.orderType||'').toLowerCase().includes(q) ||
      (o.prodStatus||'').toLowerCase().includes(q) ||
      (o.invStatus||'').toLowerCase().includes(q) ||
      (o.delStatus||'').toLowerCase().includes(q) ||
      (o.paySummary||'').toLowerCase().includes(q)
    );
  }

  // Sort
  if (sortCol) {
    const col = COLUMNS.find(c => c.key === sortCol);
    if (col) {
      list.sort((a, b) => {
        let av = a[sortCol], bv = b[sortCol];
        if (sortCol === 'total') { av = computeTotalValue(a); bv = computeTotalValue(b); }
        if (av == null) av = ''; if (bv == null) bv = '';
        if (col.type === 'num') {
          return sortDir === 'asc' ? (Number(av)||0) - (Number(bv)||0) : (Number(bv)||0) - (Number(av)||0);
        }
        if (col.type === 'date') {
          const ad = av ? new Date(av).getTime() : 0;
          const bd = bv ? new Date(bv).getTime() : 0;
          return sortDir === 'asc' ? ad - bd : bd - ad;
        }
        return sortDir === 'asc'
          ? String(av).localeCompare(String(bv))
          : String(bv).localeCompare(String(av));
      });
    }
  } else {
    list.sort((a,b) => (a.id||'').localeCompare(b.id||''));
  }
  return list;
}

/* ============================================================
   Render table header
   ============================================================ */
function renderHeader() {
  const thead = document.getElementById('ordersHead');
  thead.innerHTML = `<tr>${
    COLUMNS.map(c => {
      let cls = c.cls === 'purple' ? 'purple' : '';
      if (c.sortable) cls += ' sortable';
      if (sortCol === c.key) cls += sortDir === 'asc' ? ' sort-asc' : ' sort-desc';
      return `<th class="${cls.trim()}" data-col="${c.key}">${c.label}</th>`;
    }).join('')
  }</tr>`;

  // Wire header click for sort
  thead.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col; sortDir = 'asc';
      }
      renderHeader();
      renderOrders();
    });
  });
}

/* ============================================================
   Render orders table body
   ============================================================ */
function renderOrders() {
  const list = getFilteredOrders();
  const tbody = document.getElementById('ordersBody');

  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="${COLUMNS.length}" style="padding:40px;text-align:center;color:#7F7F7F;">
      <strong style="color:#1F3864;font-size:15px;display:block;margin-bottom:6px;">No orders match</strong>
      Try a different filter or search query.
    </td></tr>`;
    return;
  }

  tbody.innerHTML = list.map(o => {
    const total = computeTotalValue(o);
    const paySummary = o.paySummary || computePaySummary(o);
    const rowCls = rowStatusClass(o);
    const selCls = selectedIds.has(o.id) ? 'selected' : '';
    return `
      <tr data-id="${escapeHtml(o.id)}" class="${rowCls} ${selCls}">
        <td><span class="sel-cb"></span>${escapeHtml(o.id)}</td>
        <td>${fmtDate(o.orderDate)}</td>
        <td>${escapeHtml(o.custNo)}</td>
        <td>${escapeHtml(o.custName)}</td>
        <td>${escapeHtml(o.orderType)}</td>
        <td>${escapeHtml(o.productType)}</td>
        <td class="desc">${escapeHtml(o.desc)}</td>
        <td class="num">${fmtInt(o.qty)}</td>
        <td>${escapeHtml(o.qtyUnit)}</td>
        <td class="num">${fmtNum(o.unitPrice)}</td>
        <td class="num">${o.cliche ? fmtNum(o.cliche) : ''}</td>
        <td class="num"><strong>${fmtNum(total)}</strong></td>
        <td>${fmtDate(o.deadline)}</td>
        <td class="${statusClass(o.prodStatus)}">${escapeHtml(o.prodStatus)}</td>
        <td class="${statusClass(o.invStatus)}">${escapeHtml(o.invStatus)}</td>
        <td class="${statusClass(o.delStatus)}">${escapeHtml(o.delStatus)}</td>
        <td class="num">${o.remainQty ? fmtInt(o.remainQty) : ''}</td>
        <td>${escapeHtml(o.advance50 || '')}</td>
        <td>${escapeHtml(o.fullPay || '')}</td>
        <td>${escapeHtml(paySummary)}</td>
      </tr>
    `;
  }).join('');

  // Wire row interactions
  tbody.querySelectorAll('tr[data-id]').forEach(tr => {
    let touchTimer = null;
    let longPressed = false;

    tr.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) return;
      longPressed = false;
      touchTimer = setTimeout(() => {
        longPressed = true;
        enterSelectionMode(tr.dataset.id);
        if (navigator.vibrate) navigator.vibrate(15);
      }, 500);
    }, { passive: true });

    tr.addEventListener('touchmove', () => {
      clearTimeout(touchTimer);
    }, { passive: true });

    tr.addEventListener('touchend', (e) => {
      clearTimeout(touchTimer);
      if (longPressed) { e.preventDefault(); return; }
      // If in selection mode, toggle row instead of opening edit
      if (selectionMode) {
        e.preventDefault();
        toggleSelection(tr.dataset.id);
      } else {
        // Delay slightly to detect double-tap
        const id = tr.dataset.id;
        const now = Date.now();
        if (tr._lastTap && now - tr._lastTap < 300) {
          // double tap — ignore, we use single tap
        }
        tr._lastTap = now;
        openEdit(id);
      }
    });

    // For desktop: click = open edit
    tr.addEventListener('click', (e) => {
      if (e.sourceCapabilities && e.sourceCapability.firesTouchEvents) return;
      if (selectionMode) {
        toggleSelection(tr.dataset.id);
      } else {
        openEdit(tr.dataset.id);
      }
    });
  });
}

/* ============================================================
   Selection mode
   ============================================================ */
function enterSelectionMode(id) {
  selectionMode = true;
  selectedIds.clear();
  if (id) selectedIds.add(id);
  document.getElementById('ordersBody').classList.add('sel-mode');
  document.getElementById('bulkBar').classList.add('show');
  updateBulkBar();
  renderOrders();
}
function toggleSelection(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  if (selectedIds.size === 0) exitSelectionMode();
  else { updateBulkBar(); renderOrders(); }
}
function exitSelectionMode() {
  selectionMode = false;
  selectedIds.clear();
  document.getElementById('ordersBody').classList.remove('sel-mode');
  document.getElementById('bulkBar').classList.remove('show');
  renderOrders();
}
function updateBulkBar() {
  document.getElementById('bulkCount').textContent = `${selectedIds.size} selected`;
}

document.getElementById('bulkBar').addEventListener('click', (e) => {
  const btn = e.target.closest('.bulk-btn');
  if (!btn) return;
  const action = btn.dataset.bulk;
  const ids = Array.from(selectedIds);
  if (action === 'cancel') { exitSelectionMode(); return; }
  if (action === 'delete') {
    if (!confirm(`Delete ${ids.length} orders?`)) return;
    const deleted = [];
    ids.forEach(id => {
      const o = orders.find(x => x.id === id);
      if (o) deleted.push({...o, _idx: orders.indexOf(o)});
    });
    orders = orders.filter(o => !selectedIds.has(o.id));
    save();
    showToast(`${ids.length} orders deleted`, 'Undo', () => {
      deleted.sort((a,b) => a._idx - b._idx);
      deleted.forEach(d => { const {_idx, ...rest} = d; orders.splice(_idx, 0, rest); });
      save(); renderOrders();
    });
  } else if (action === 'completed') {
    ids.forEach(id => { const o = orders.find(x => x.id === id); if (o) o.prodStatus = 'Completed'; });
    save(); showToast(`${ids.length} marked completed`);
  } else if (action === 'invoiced') {
    ids.forEach(id => { const o = orders.find(x => x.id === id); if (o) o.invStatus = 'Invoiced'; });
    save(); showToast(`${ids.length} marked invoiced`);
  } else if (action === 'delivered') {
    ids.forEach(id => { const o = orders.find(x => x.id === id); if (o) o.delStatus = 'Fully Delivered'; });
    save(); showToast(`${ids.length} marked delivered`);
  }
  exitSelectionMode();
});

    invStatus: document.getElementById('f_invStatus').value,
    delStatus: document.getElementById('f_delStatus').value,
    remainQty: parseFloat(document.getElementById('f_remainQty').value) || 0,
    advance50: document.getElementById('f_advance50').value,
    fullPay: document.getElementById('f_fullPay').value,
    photo: photo,
  };
  data.total = computeTotalValue(data);
  data.paySummary = computePaySummary(data);

  if (editingId) {
    const idx = orders.findIndex(x => x.id === editingId);
    if (idx !== -1) {
      orders[idx] = { ...orders[idx], ...data };
      showToast(`Updated ${editingId}`);
    }
  } else {
    let maxNum = 0;
    orders.forEach(o => {
      const m = (o.id || '').match(/^ORD-(\d+)$/);
      if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
    });
    const newId = `ORD-${String(maxNum + 1).padStart(3, '0')}`;
    orders.push({ id: newId, ...data });
    showToast(`Added ${newId}`);
  }
  save();
  renderOrders();
  closeSheet();
}

function confirmDelete(id) {
  if (!confirm(`Delete order ${id}? This cannot be undone.`)) return;
  const idx = orders.findIndex(x => x.id === id);
  if (idx === -1) return;
  const snapshot = { ...orders[idx], _idx: idx };
  orders.splice(idx, 1);
  save();
  renderOrders();
  closeSheet();
  showToast(`Deleted ${id}`, 'Undo', () => {
    const { _idx, ...rest } = snapshot;
    orders.splice(_idx, 0, rest);
    save();
    renderOrders();
    showToast(`Restored ${id}`);
  });
}

/* ============================================================
   Dashboard — Modern Multinational Style
   ============================================================ */
function renderDashboard() {
  const total = orders.length;
  const totalValue = orders.reduce((s,o) => s + (computeTotalValue(o) || 0), 0);
  const totalCliche = orders.reduce((s,o) => s + (+o.cliche || 0), 0);
  const completed = orders.filter(o => o.prodStatus === 'Completed').length;
  const inProgress = orders.filter(o => o.prodStatus === 'In Progress').length;
  const invoiced = orders.filter(o => o.invStatus === 'Invoiced').length;
  const notInvoiced = orders.filter(o => o.invStatus === 'Not Invoiced').length;
  const delivered = orders.filter(o => o.delStatus === 'Fully Delivered').length;
  const notShipped = orders.filter(o => o.delStatus === 'Not Shipped').length;
  const newOrders = orders.filter(o => o.orderType === 'New Order').length;
  const reorders = orders.filter(o => o.orderType === 'Reorder').length;
  const paid = orders.filter(o => o.paySummary && o.paySummary.includes('Fully Paid')).length;
  const advance = orders.filter(o => o.paySummary && o.paySummary.includes('50%')).length;
  const noPay = orders.filter(o => o.paySummary && o.paySummary.includes('No Payment')).length;
  const completionRate = total ? (completed/total*100) : 0;
  const deliveryRate = total ? (delivered/total*100) : 0;
  const invoiceRate = total ? (invoiced/total*100) : 0;
  const overdue = orders.filter(o => o.prodStatus !== 'Completed' && daysUntil(o.deadline) < 0).length;
  const urgent = orders.filter(o => {
    if (o.prodStatus === 'Completed') return false;
    const d = daysUntil(o.deadline);
    return d !== null && d >= 0 && d <= 7;
  }).length;
  const avgOrder = total ? totalValue / total : 0;

  // Sales by product
  const byProduct = {};
  orders.forEach(o => {
    if (!byProduct[o.productType]) byProduct[o.productType] = { count: 0, value: 0 };
    byProduct[o.productType].count++;
    byProduct[o.productType].value += computeTotalValue(o) || 0;
  });
  const productArr = Object.entries(byProduct).sort((a,b) => b[1].value - a[1].value);
  const maxProd = Math.max(...productArr.map(p => p[1].value), 1);
  const productColors = ['#00D4FF','#A78BFA','#FF6B9D','#FFC542','#00D9A3','#FF4757'];

  // Top customers
  const byCust = {};
  orders.forEach(o => {
    if (!byCust[o.custName]) byCust[o.custName] = { count: 0, value: 0 };
    byCust[o.custName].count++;
    byCust[o.custName].value += computeTotalValue(o) || 0;
  });
  const custArr = Object.entries(byCust).sort((a,b) => b[1].value - a[1].value).slice(0, 5);

  // Monthly orders (last 6 months)
  const now = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = d.toLocaleDateString('en', { month: 'short' });
    const count = orders.filter(o => (o.orderDate || '').startsWith(key)).length;
    const value = orders.filter(o => (o.orderDate || '').startsWith(key))
                       .reduce((s,o) => s + (computeTotalValue(o) || 0), 0);
    months.push({ label, count, value });
  }
  const maxMonthCount = Math.max(...months.map(m => m.count), 1);

  // Sparkline SVG
  function sparkline(values, color, w=80, h=24) {
    if (!values.length) return '';
    const max = Math.max(...values, 1);
    const min = Math.min(...values, 0);
    const range = max - min || 1;
    const points = values.map((v, i) => {
      const x = (i / (values.length - 1 || 1)) * w;
      const y = h - ((v - min) / range) * (h - 4) - 2;
      return `${x},${y}`;
    }).join(' ');
    return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:100%;">
      <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  }

  // Donut SVG
  function donut(segments, size=80, stroke=10) {
    const r = (size - stroke) / 2;
    const cx = size / 2;
    const circ = 2 * Math.PI * r;
    let offset = 0;
    const totalSeg = segments.reduce((s,x) => s + x.value, 0) || 1;
    const arcs = segments.map(s => {
      const frac = s.value / totalSeg;
      const len = frac * circ;
      const dash = `${len} ${circ - len}`;
      const html = `<circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${stroke}" stroke-dasharray="${dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cx})"/>`;
      offset += len;
      return html;
    });
    const pct = segments[0] ? Math.round(segments[0].value / totalSeg * 100) : 0;
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${arcs.join('')}<text x="50%" y="50%" text-anchor="middle" dy=".35em" font-size="18" font-weight="800" fill="#fff">${pct}%</text></svg>`;

  // Monthly line chart

    const x = pad + (i / (months.length - 1 || 1)) * chartW;

          <div class="kpi-sub">Past deadline</div>
          <div class="spark">${sparkline([2,4,3,5,6,overdue], 'var(--dash-red)')}</div>

        <div class="kpi-tile">
          <div class="kpi-top">
            <div class="kpi-ico cyan">📦</div>

          </div>
          <div class="kpi-val">${delivered}</div>
          <div class="kpi-sub">${deliveryRate.toFixed(1)}% delivery rate</div>

      <!-- Production funnel -->
      <div class="dash-card">
        <div class="dash-card-title">Production Pipeline <span class="sub">Funnel</span></div>
        <div class="funnel">
          <div class="funnel-row">
            <div class="funnel-label">Total</div>
            <div class="funnel-track"><div class="funnel-fill" style="width:100%;background:linear-gradient(90deg,#00D4FF,#A78BFA);">${total}</div></div>
            <div class="funnel-val">${total}</div>

          <div class="funnel-row">
            <div class="funnel-label">In Progress</div>

      <!-- Donut row -->
      <div class="dash-card">
        <div class="dash-card-title">Status Distribution <span class="sub">Production · Invoice · Payment</span></div>
        <div class="donut-row">
          <div class="donut-cell">

        <div class="donut-legend">
          <div class="donut-legend-item"><span class="donut-legend-dot" style="background:#00D9A3"></span>Fully Paid<span class="donut-legend-val">${paid}</span></div>
          <div class="donut-legend-item"><span class="donut-legend-dot" style="background:#FFC542"></span>50% Advance<span class="donut-legend-val">${advance}</span></div>
          <div class="donut-legend-item"><span class="donut-legend-dot" style="background:#FF4757"></span>No Payment<span class="donut-legend-val">${noPay}</span></div>
        </div>
      </div>

      <!-- Orders trend line chart -->
      <div class="dash-card">
        <div class="dash-card-title">Orders Trend <span class="sub">Last 6 months</span></div>
        <svg class="line-chart-svg" viewBox="0 0 ${lineW} ${lineH}">
          <defs>

        <div class="dash-card-title">Revenue by Product Type <span class="sub">SAR</span></div>
        <div class="bar-list">
          ${productArr.map(([name, d], i) => `
            <div class="bar-item">
              <div class="bar-item-head">
                <span class="bar-item-name">${escapeHtml(name)}</span>
                <span class="bar-item-val">${fmtNum(d.value, 0)} SAR · ${d.count} ord</span>
              </div>
              <div class="bar-item-track">
                <div class="bar-item-fill" style="width:${(d.value/maxProd*100).toFixed(1)}%;background:linear-gradient(90deg,${productColors[i]},${productColors[i]}aa);"></div>

      <!-- Top customers leaderboard -->

/* ============================================================
   Tab switching
   ============================================================ */
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  if (name === 'orders') {
    document.getElementById('pane-orders').style.display = 'block';
    document.getElementById('pane-dashboard').style.display = 'none';
    document.getElementById('content').className = 'content tabular';
    document.getElementById('headerTitle').textContent = 'Order Tracker';
    renderOrders();
  } else {
    document.getElementById('pane-orders').style.display = 'none';
    document.getElementById('pane-dashboard').style.display = 'block';
    document.getElementById('content').className = 'content dashboard-scroll';
    document.getElementById('headerTitle').textContent = 'Dashboard';
    renderDashboard();
  }
}
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => switchTab(t.dataset.tab));
});

/* ============================================================
   Search, chips, buttons
   ============================================================ */
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  if (currentTab === 'orders') renderOrders();
});

document.getElementById('chipRow').addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  const f = chip.dataset.filter;
  if (activeFilters.has(f)) {
    activeFilters.delete(f);
    chip.classList.remove('active');
  } else {
    activeFilters.add(f);
    chip.classList.add('active');
  }
  renderOrders();
});

document.getElementById('addBtn').addEventListener('click', openNew);
document.getElementById('cancelBtn').addEventListener('click', closeSheet);
document.getElementById('saveBtn').addEventListener('click', saveOrder);
document.getElementById('deleteBtn').addEventListener('click', () => {
  if (editingId) confirmDelete(editingId);
});
document.getElementById('backdrop').addEventListener('click', closeSheet);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSheet(); });

/* CSV export */
document.getElementById('csvBtn').addEventListener('click', () => {
  const list = getFilteredOrders();
  const headers = COLUMNS.map(c => c.label);
  const rows = list.map(o => COLUMNS.map(c => {
    let v = c.key === 'total' ? computeTotalValue(o) : o[c.key];
    return `"${String(v ?? '').replace(/"/g, '""')}"`;
  }));
  const csv = [headers.map(h => `"${h}"`).join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `century-gate-orders-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`Exported ${list.length} orders to CSV`);
});

/* PDF export — grouped by product type */
document.getElementById('pdfBtn').addEventListener('click', () => {
  const list = getFilteredOrders();
  if (!list.length) { showToast('No orders to export'); return; }

  // Group by product type
  const groups = {};
  list.forEach(o => {
    const k = o.productType || 'Other';
    if (!groups[k]) groups[k] = [];
    groups[k].push(o);
  });
  const groupKeys = Object.keys(groups).sort();

  // Summary stats
  const totalValue = list.reduce((s,o) => s + (computeTotalValue(o) || 0), 0);
  const totalQty = list.reduce((s,o) => s + (+o.qty || 0), 0);
  const completed = list.filter(o => o.prodStatus === 'Completed').length;
  const invoiced = list.filter(o => o.invStatus === 'Invoiced').length;
  const delivered = list.filter(o => o.delStatus === 'Fully Delivered').length;

  const today = new Date();
  const dateStr = today.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });

  let html = `
    <div class="print-doc">
      <!-- Cover -->
      <div class="print-cover">
        <h1>🏭 CENTURY GATE COMPANY LTD</h1>
        <div class="print-sub">Production Order Report — ${dateStr}</div>
      </div>

      <div class="print-meta">
        <div><strong>Report generated:</strong> ${dateStr}</div>
        <div><strong>Filter applied:</strong> ${activeFilters.size ? Array.from(activeFilters).join(', ') : 'All orders'} ${searchQuery ? `· Search: "${searchQuery}"` : ''}</div>
      </div>

      <!-- Summary table -->
      <table class="print-summary">
        <tr>
          <th>Total Orders</th>
          <th>Total Quantity</th>
          <th>Total Value (SAR)</th>
          <th>Completed</th>
          <th>Invoiced</th>
          <th>Delivered</th>
        </tr>
        <tr>
          <td style="text-align:center;font-weight:700;">${list.length}</td>
          <td style="text-align:center;font-weight:700;">${fmtInt(totalQty)}</td>
          <td style="text-align:center;font-weight:700;color:#1F3864;">${fmtNum(totalValue, 2)}</td>
          <td style="text-align:center;font-weight:700;color:#1F6B42;">${completed}</td>
          <td style="text-align:center;font-weight:700;color:#2E75B6;">${invoiced}</td>
          <td style="text-align:center;font-weight:700;color:#1A5276;">${delivered}</td>
        </tr>
      </table>
  `;

  // Sections per product type
  groupKeys.forEach(pt => {
    const items = groups[pt];
    const groupTotal = items.reduce((s,o) => s + (computeTotalValue(o) || 0), 0);
    const groupQty = items.reduce((s,o) => s + (+o.qty || 0), 0);
    html += `
      <div class="print-section">
        <div class="print-section-title">
          <span>📦 ${escapeHtml(pt)}</span>
          <span class="count">${items.length} orders · ${fmtInt(groupQty)} units · ${fmtNum(groupTotal, 2)} SAR</span>
        </div>
        <table class="print-table">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Order Date</th>
              <th class="purple">Customer</th>
              <th class="purple">Order Type</th>
              <th>Description</th>
              <th>Quantity</th>
              <th>Unit Price</th>
              <th>Total Value</th>
              <th>Deadline</th>
              <th>Production</th>
              <th>Invoice</th>
              <th class="purple">Delivery</th>
              <th>Payment</th>
            </tr>
          </thead>
          <tbody>
            ${items.map(o => {
              const total = computeTotalValue(o);
              const pay = o.paySummary || computePaySummary(o);
              const stCls = (s) => {
                if (s === 'Completed') return 'completed';
                if (s === 'In Progress') return 'progress';
                if (s === 'Invoiced') return 'invoiced';
                if (s === 'Not Invoiced') return 'not-invoiced';
                if (s === 'Fully Delivered') return 'delivered';
                if (s === 'Not Shipped') return 'not-shipped';
                return '';
              };
              return `<tr>
                <td>${escapeHtml(o.id)}</td>
                <td>${fmtDate(o.orderDate)}</td>
                <td class="left">${escapeHtml(o.custName)}</td>
                <td>${escapeHtml(o.orderType)}</td>
                <td class="left">${escapeHtml(o.desc)}</td>
                <td class="num">${fmtInt(o.qty)} ${escapeHtml(o.qtyUnit)}</td>
                <td class="num">${fmtNum(o.unitPrice)}</td>
                <td class="num"><strong>${fmtNum(total)}</strong></td>
                <td>${fmtDate(o.deadline)}</td>
                <td class="print-st ${stCls(o.prodStatus)}">${escapeHtml(o.prodStatus)}</td>
                <td class="print-st ${stCls(o.invStatus)}">${escapeHtml(o.invStatus)}</td>
                <td class="print-st ${stCls(o.delStatus)}">${escapeHtml(o.delStatus)}</td>
                <td>${escapeHtml(pay)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  });

  html += `
      <div class="print-footer">
        Century Gate Company Ltd · Production Order Report · Page <span class="print-page-num"></span>
      </div>
    </div>
  `;

  document.getElementById('printContainer').innerHTML = html;
  showToast(`Generating PDF with ${list.length} orders in ${groupKeys.length} sections...`);
  setTimeout(() => window.print(), 300);
});

/* ============================================================
   Toast (with optional action button)
   ============================================================ */
let toastTimer;
function showToast(msg, actionLabel, actionFn) {
  const t = document.getElementById('toast');
  t.innerHTML = actionLabel
    ? `${escapeHtml(msg)} <button class="toast-action">${escapeHtml(actionLabel)}</button>`
    : escapeHtml(msg);
  t.classList.add('show');
  clearTimeout(toastTimer);
  if (actionLabel && actionFn) {
    t.querySelector('.toast-action').onclick = () => {
      actionFn();
      t.classList.remove('show');
    };
    toastTimer = setTimeout(() => t.classList.remove('show'), 5000);
  } else {
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }
}

/* ============================================================
   Service Worker (offline)
   ============================================================ */
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'cg-orders-v3';
    self.addEventListener('install', (e) => { self.skipWaiting(); e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./'])).catch(()=>{})); });
    self.addEventListener('activate', (e) => { e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))).then(() => self.clients.claim())); });
    self.addEventListener('fetch', (e) => {
      const req = e.request;
      if (req.method !== 'GET') return;
      e.respondWith(caches.match(req).then(cached => {
        const network = fetch(req).then(res => {
          if (res && res.status === 200 && res.type === 'basic') {
            const clone = res.clone();
            caches.open(CACHE).then(c => c.put(req, clone));
          }
          return res;
        }).catch(() => cached);
        return cached || network;
      }));
    });
  `;
  try {
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(() => {});
  } catch (e) {}
}
